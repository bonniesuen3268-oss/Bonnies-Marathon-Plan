function getSessionPace(session) {

// ── HELPERS ──────────────────────────────────────────────────────────────────
function mpsToMmSs(mps) {
  if (!mps || mps<=0) return "";
  var s=1000/mps, m=Math.floor(s/60);
  return m+":"+Math.round(s%60).toString().padStart(2,"0");
}
function paceToMin(p) {
  if (!p) return null;
  var parts=p.split(":"); if(parts.length!==2) return null;
  return parseInt(parts[0])+parseInt(parts[1])/60;
}
function parseStravaActivities(acts) {
  var runs={};
  (acts||[]).filter(function(a){ return a.type==="Run"&&a.distance>=500; }).forEach(function(a){
    var d=new Date(a.start_date_local).toISOString().substring(0,10);
    var key=runs[d]?d+"-"+a.id:d;
    var mt=a.moving_time,mm=Math.floor(mt/60),ms=mt%60;
    runs[key]={ km:+(a.distance/1000).toFixed(2), pace:mpsToMmSs(a.average_speed), duration:mm+":"+ms.toString().padStart(2,"0"), notes:a.name||"Run" };
  });
  return runs;
}

// Cycle helpers
function getPhaseIdx(day, cycleLen) {
  var cl = cycleLen || 28;
  var ovDay = cl - 14; // ovulation
  if (day<=5) return 0; // menstrual
  if (day<=ovDay-1) return 1; // follicular
  if (day<=ovDay+3) return 2; // ovulation
  return 3; // luteal
}
function getDayInCycle(periods, cycleLen) {
  if (!periods||periods.length===0) return 10;
  var sorted=periods.slice().sort(function(a,b){ return new Date(b.start)-new Date(a.start); });
  var pStart=new Date(sorted[0].start);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=Math.floor((today-pStart)/86400000)+1;
  var cl=cycleLen||28;
  while(diff>cl) diff-=cl;
  return Math.max(1,diff);
}
function getWeekPhase(weekStartDate, periods, cycleLen) {
  if (!periods||periods.length===0) return null;
  var wDate=new Date(weekStartDate);
  var sorted=periods.slice().sort(function(a,b){ return new Date(b.start)-new Date(a.start); });
  var pStart=new Date(sorted[0].start);
  var cl=cycleLen||28;
  var diff=Math.floor((wDate-pStart)/86400000)+1;
  while(diff>cl) diff-=cl;
  while(diff<1) diff+=cl;
  return { phaseIdx:getPhaseIdx(diff,cl), day:diff };
}

// Build live plan with time-off and cycle adjustments
function buildLivePlan(timeOffWeeks, periods, cycleLen) {
  return BASE_PLAN.map(function(wk) {
    var tof = (timeOffWeeks||[]).find(function(t){ return t.week===wk.week; });
    var ci = getWeekPhase(wk.startDate, periods, cycleLen);
    var ph = ci ? CYCLE_PHASES[ci.phaseIdx] : null;
    var adjustedTarget = wk.target;
    var note = "";
    if (tof) {
      adjustedTarget = Math.round(wk.target * (tof.pct/100));
      note = "Holiday: "+tof.pct+"% capacity";
    } else if (ph) {
      if (ph.mod==="REDUCE") { adjustedTarget=Math.round(wk.target*0.75); note="Period week: reduced"; }
      else if (ph.mod==="PEAK") { note="Peak energy: push it!"; }
      else if (ph.mod==="TAPER") { adjustedTarget=Math.round(wk.target*0.9); note="Luteal: slight taper"; }
    }
    return Object.assign({}, wk, { adjustedTarget:adjustedTarget, cycleInfo:ci, phase:ph, note:note, isTimeOff:!!tof });
  });
}

// Fitness score (simple: % of planned km completed, weighted recent)
function calcFitnessScore(completedWeeks) {
  var recent=completedWeeks.slice(-6);
  var score=recent.reduce(function(s,w){ return s+(w.actual/w.planned); },0)/recent.length;
  return Math.min(1, score);
}

// Goal assessment
function assessGoal(allRuns, completedWeeks, sessions, livePlan) {
  var paces=Object.values(allRuns).map(function(r){ return paceToMin(r.pace); }).filter(Boolean);
  var avgP=paces.length>0?paces.reduce(function(s,p){ return s+p; },0)/paces.length:6.5;
  var goalPace=5.683; // 5:41
  var paceGap=avgP-goalPace; // positive = slower than goal
  var fitness=calcFitnessScore(completedWeeks);
  var totalPlanned=completedWeeks.reduce(function(s,w){ return s+w.planned; },0);
  var totalActual=completedWeeks.reduce(function(s,w){ return s+w.actual; },0);
  var adherence=totalActual/totalPlanned;

  // Current week done?
  var curWk=livePlan.find(function(w){ return w.week==="Week 16"; });
  var weekDone=0,weekTotal=0;
  if(curWk){ weekTotal=curWk.sessions.length; weekDone=curWk.sessions.filter(function(_,i){ return sessions["Week 16_"+i]; }).length; }

  var status, color, message, tip;
  if (paceGap > 0.6 && adherence < 0.75) {
    status="Needs Focus"; color=P.coral;
    message="You're currently "+Math.round(paceGap*60)+"sec/km off goal pace and below planned km. Sub-4 is still achievable but needs consistency.";
    tip="Focus on completing tempo runs at 5:50-6:10/km. Don't skip the long runs!";
  } else if (paceGap > 0.4) {
    status="Building"; color=P.orange;
    message="Pace gap is "+Math.round(paceGap*60)+"sec/km. You're building well — keep pushing tempo sessions.";
    tip="Nail your tempo runs at 5:50-6:10/km. Each one closes the gap.";
  } else if (adherence >= 0.9 && paceGap < 0.3) {
    status="On Track"; color=P.teal;
    message="Great consistency! Pace is getting close to goal. Keep up the long runs.";
    tip="You're on track. Don't skip recovery — it's when fitness is built.";
  } else {
    status="Good Progress"; color="#06D6A0";
    message="Solid progress! Stay consistent and the pace will come.";
    tip="Keep showing up. Consistency beats perfection.";
  }

  var weekStatus, weekColor;
  if(weekTotal===0){ weekStatus=""; weekColor=P.textSoft; }
  else if(weekDone===weekTotal){ weekStatus="Week complete!"; weekColor=P.teal; }
  else if(weekDone>=Math.ceil(weekTotal/2)){ weekStatus="Great week!"; weekColor=P.teal; }
  else if(weekDone===0){ weekStatus="Not started"; weekColor=P.textSoft; }
  else { weekStatus="In progress"; weekColor=P.orange; }

  return { status, color, message, tip, paceGap, adherence, fitness, weekStatus, weekColor, weekDone, weekTotal };
}

// ── BAR CHART ────────────────────────────────────────────────────────────────
function BarChart({ pastData, liveWeek, sessions }) {
  const [hov, setHov] = useState(null);
  // Calculate live week actual from sessions + strava
  var liveActual = 0;
  if (liveWeek) {
    liveWeek.sessions.forEach(function(s,i){
      if (sessions["Week 16_"+i]) {
        var km=parseFloat(s.match(/(\d+)km/)?.[1]||0);
        liveActual+=km;
      }
    });
  }
  var allData = pastData.concat(liveWeek?[{ week:"Week 16", dates:"This week", planned:liveWeek.target, actual:liveActual, live:true }]:[]);
  var max=Math.max.apply(null,allData.map(function(d){ return Math.max(d.planned||0,d.actual||0); }));
  if(max===0) max=1;
  return (
    <div>
      {hov!==null&&(
        <div style={{background:P.textDark,color:"#fff",borderRadius:12,padding:"8px 12px",marginBottom:8,fontSize:11}}>
          <strong>{allData[hov].week}</strong> {allData[hov].live?"(this week — ticking off sessions)":""}<br/>
          <span style={{color:P.teal}}>Actual: {allData[hov].actual.toFixed(1)}km</span>&nbsp;
          <span style={{color:"rgba(255,255,255,0.5)"}}>Planned: {allData[hov].planned}km</span>
          {allData[hov].runs&&<span style={{color:P.yellow}}>&nbsp;Runs: {allData[hov].runs}</span>}
        </div>
      )}
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:72,overflowX:"auto",paddingBottom:2}}>
        {allData.map(function(d,i){
          var aH=Math.max(Math.round((d.actual/max)*66),2);
          var pH=Math.max(Math.round((d.planned/max)*66),2);
          var over=d.actual>=d.planned;
          var sel=hov===i;
          return (
            <div key={i} style={{display:"flex",alignItems:"flex-end",gap:1,cursor:"pointer",flexShrink:0}}
              onMouseEnter={function(){ setHov(i); }} onMouseLeave={function(){ setHov(null); }}
              onClick={function(){ setHov(sel?null:i); }}>
              <div style={{width:9,height:pH,background:sel?P.electric+"90":P.electric+"25",borderRadius:"3px 3px 0 0"}}/>
              <div style={{width:9,height:aH,background:sel?(over?P.teal:P.orange):(over?P.teal+"CC":P.orange+"AA"),borderRadius:"3px 3px 0 0",
                outline:d.live?"2px dashed "+P.electric:"none",outlineOffset:1}}/>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:9,color:P.textSoft,marginTop:3}}>Tap bar for details · Current week updates as you tick off sessions</div>
    </div>
  );
}

// ── SESSION ITEM ─────────────────────────────────────────────────────────────
function SessionItem({ session, done, onToggle, showPace }) {
  const [open, setOpen] = useState(false);
  var pace = getSessionPace(session);
  var isCross = session.toLowerCase().includes("pilates")||session.toLowerCase().includes("strength")||session.toLowerCase().includes("rest");
  var isRace = session.toLowerCase().includes("race day");
  var emoji = done?"✅":isRace?"🏁":isCross?"🧘":session.includes("Tempo")?"🔥":session.includes("Long")||session.includes("PEAK")?"🌟":"🐣";
  return (
    <div style={{borderBottom:"1px solid "+P.border}}>
      <div style={{display:"flex",alignItems:"center",gap:9,padding:"8px 0",cursor:"pointer"}} onClick={onToggle}>
        <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(done?P.teal:P.borderMid),background:done?P.teal:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {done&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
        </div>
        <span style={{flex:1,fontSize:12,color:done?P.textSoft:P.textDark,textDecoration:done?"line-through":"none",fontWeight:done?400:600}}>{emoji} {session}</span>
        {showPace&&!isCross&&!isRace&&(
          <span onClick={function(e){e.stopPropagation();setOpen(!open);}} style={{fontSize:9,fontWeight:700,color:pace===GOAL_PACES.tempo?P.orange:P.electric,background:(pace===GOAL_PACES.tempo?P.orange:P.electric)+"15",borderRadius:6,padding:"2px 6px",cursor:"pointer",flexShrink:0}}>
            {pace.min}-{pace.max}
          </span>
        )}
      </div>
      {open&&(
        <div style={{background:P.electric+"08",borderRadius:10,padding:"8px 10px",marginBottom:8,fontSize:11}}>
          <div style={{fontWeight:800,color:P.electric,marginBottom:2}}>{pace.label} pace: {pace.min}–{pace.max}/km</div>
          <div style={{color:P.textMid}}>{pace.why}</div>
          {!isCross&&<div style={{color:P.teal,marginTop:4,fontWeight:600}}>Race pace target: 5:38–5:44/km</div>}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dashboard");
  const [auth, setAuth] = useState(null);
  const [stravaRuns, setStravaRuns] = useState({});
  const [syncing, setSyncing] = useState(false);
  const [sessions, setSessions] = useState({});
  const [closedWeeks, setClosedWeeks] = useState({});
  const [periods, setPeriods] = useState([]);
  const [cycleLen, setCycleLen] = useState(28);
  const [newStart, setNewStart] = useState("");
  const [newEnd, setNewEnd] = useState("");
  const [expanded, setExpanded] = useState(null);
  const [timeOffWeeks, setTimeOffWeeks] = useState([]);
  const [timeOffModal, setTimeOffModal] = useState(false);
  const [newTOWeek, setNewTOWeek] = useState("");
  const [newTOPct, setNewTOPct] = useState(30);
  const [toast, setToast] = useState("");

  const showToast = function(m){ setToast(m); setTimeout(function(){ setToast(""); },3000); };

  var allRuns = useMemo(function(){ return Object.assign({},STRAVA_HISTORY,stravaRuns); },[stravaRuns]);
  var raceDate = new Date("2026-08-30");
  var today = new Date(); today.setHours(0,0,0,0);
  var daysLeft = Math.ceil((raceDate-today)/86400000);

  var livePlan = useMemo(function(){ return buildLivePlan(timeOffWeeks,periods,cycleLen); },[timeOffWeeks,periods,cycleLen]);
  var cycleDay = getDayInCycle(periods,cycleLen);
  var phaseIdx = getPhaseIdx(cycleDay,cycleLen);
  var phase = CYCLE_PHASES[phaseIdx];
  var nextPeriod = cycleLen-cycleDay;
  var fertile = phaseIdx===2;
  var ovDay = cycleLen-14;

  var allRunVals = Object.values(allRuns);
  var totalKm = allRunVals.reduce(function(s,r){ return s+(r.km||0); },0);
  var paces = allRunVals.map(function(r){ return paceToMin(r.pace); }).filter(Boolean);
  var avgP = paces.length>0?paces.reduce(function(s,p){ return s+p; },0)/paces.length:6.2;
  var avgPStr = Math.floor(avgP)+":"+(Math.round((avgP%1)*60)).toString().padStart(2,"0");

  var totalPlanned = COMPLETED_WEEKS.reduce(function(s,w){ return s+w.planned; },0);
  var totalActual = COMPLETED_WEEKS.reduce(function(s,w){ return s+w.actual; },0);
  var athleteId = auth&&auth.athlete?auth.athlete.id||"bonnie_default":null;

  var assessment = useMemo(function(){ return assessGoal(allRuns,COMPLETED_WEEKS,sessions,livePlan); },[allRuns,sessions,livePlan]);

  // Find current and next week dynamically
  var currentWeekIdx = useMemo(function(){
    var todayStr = today.toISOString().substring(0,10);
    var idx = livePlan.findIndex(function(w,i){
      var next = livePlan[i+1];
      return w.startDate <= todayStr && (!next || next.startDate > todayStr);
    });
    return idx >= 0 ? idx : 0;
  },[livePlan, today]);
  var currentWeek = livePlan[currentWeekIdx];

  var saveCloud = useCallback(async function(data){
    if(!athleteId) return;
    try{ await fetch("/api/data?athlete_id="+athleteId,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}); }catch(e){}
  },[athleteId]);

  useEffect(function(){
    var p=new URLSearchParams(window.location.search);
    var ap=p.get("auth");
    if(ap){
      try{
        var a=JSON.parse(decodeURIComponent(ap));
        localStorage.setItem("bonnie_auth",JSON.stringify(a));
        setAuth(a); window.history.replaceState({},"","/");
        showToast("Syncing your runs...");
        doSync(a);
        if(a.athlete&&a.athlete.id){
          fetch("/api/data?athlete_id="+a.athlete.id).then(function(r){ return r.json(); }).then(function(j){
            if(j.data){ if(j.data.periods) setPeriods(j.data.periods); if(j.data.sessions) setSessions(j.data.sessions);
              if(j.data.closedWeeks) setClosedWeeks(j.data.closedWeeks);
              if(j.data.cycleLen) setCycleLen(j.data.cycleLen);
              if(j.data.timeOffWeeks) setTimeOffWeeks(j.data.timeOffWeeks);
            }
          }).catch(function(){});
        }
      }catch(e){}
    } else {
      try{
        var sa=localStorage.getItem("bonnie_auth");
        if(sa){ var a2=JSON.parse(sa); setAuth(a2); doSync(a2);
          if(a2.athlete&&a2.athlete.id){
            fetch("/api/data?athlete_id="+a2.athlete.id).then(function(r){ return r.json(); }).then(function(j){
              if(j.data){ if(j.data.periods) setPeriods(j.data.periods); if(j.data.sessions) setSessions(j.data.sessions);
                if(j.data.closedWeeks) setClosedWeeks(j.data.closedWeeks);
                if(j.data.cycleLen) setCycleLen(j.data.cycleLen);
                if(j.data.timeOffWeeks) setTimeOffWeeks(j.data.timeOffWeeks);
              }
            }).catch(function(){});
          }
        }
        var sr=localStorage.getItem("bonnie_strava_runs"); if(sr) setStravaRuns(JSON.parse(sr));
        var ss=localStorage.getItem("bonnie_sessions"); if(ss) setSessions(JSON.parse(ss));
        var pp=localStorage.getItem("bonnie_periods"); if(pp) setPeriods(JSON.parse(pp));
        var cl=localStorage.getItem("bonnie_cycleLen"); if(cl) setCycleLen(parseInt(cl));
        var to=localStorage.getItem("bonnie_timeoff"); if(to) setTimeOffWeeks(JSON.parse(to));
        var cw=localStorage.getItem("bonnie_closedWeeks"); if(cw) setClosedWeeks(JSON.parse(cw));
      }catch(e){}
    }
  },[]);

  var doSync = async function(a){
    setSyncing(true);
    try{
      var mkP=function(pg,tok){ return new URLSearchParams({path:"/api/v3/athlete/activities?per_page=100&page="+pg,access_token:tok.access_token,refresh_token:tok.refresh_token,expires_at:tok.expires_at}).toString(); };
      var r1=await fetch("/api/strava-api?"+mkP(1,a)); var j1=await r1.json();
      if(j1.newTokenData){ var na=Object.assign({},a,j1.newTokenData); localStorage.setItem("bonnie_auth",JSON.stringify(na)); setAuth(na); a=na; }
      var r2=await fetch("/api/strava-api?"+mkP(2,a)); var j2=await r2.json();
      var all=(j1.data||[]).concat(j2.data||[]);
      var runs=parseStravaActivities(all);
      var filtered={};
      Object.keys(runs).forEach(function(k){ if(k>="2025-12-01") filtered[k]=runs[k]; });
      setStravaRuns(filtered);
      localStorage.setItem("bonnie_strava_runs",JSON.stringify(filtered));
      showToast(Object.keys(filtered).length+" runs synced!");
    }catch(e){ showToast("Sync failed"); }
    setSyncing(false);
  };

  var saveAll = function(upd){
    var merged=Object.assign({periods,sessions,closedWeeks,cycleLen,timeOffWeeks},upd);
    localStorage.setItem("bonnie_sessions",JSON.stringify(merged.sessions));
    localStorage.setItem("bonnie_periods",JSON.stringify(merged.periods));
    localStorage.setItem("bonnie_cycleLen",String(merged.cycleLen));
    localStorage.setItem("bonnie_timeoff",JSON.stringify(merged.timeOffWeeks));
    localStorage.setItem("bonnie_closedWeeks",JSON.stringify(merged.closedWeeks));
    saveCloud(merged);
  };

  var toggleSession = function(wk,si){
    var k=wk+"_"+si, u=Object.assign({},sessions); u[k]=!u[k];
    setSessions(u); saveAll({sessions:u});
  };

  var closeWeek = function(wkName){
    var u=Object.assign({},closedWeeks); u[wkName]=true;
    setClosedWeeks(u); saveAll({closedWeeks:u});
    showToast("Week closed! Moving to next week.");
  };

  var savePeriod = function(){
    if(!newStart){ showToast("Enter a start date"); return; }
    var updated=periods.filter(function(p){ return p.start!==newStart; });
    updated.push({ start:newStart, end:newEnd||newStart });
    updated.sort(function(a,b){ return new Date(a.start)-new Date(b.start); });
    setPeriods(updated); saveAll({periods:updated});
    setNewStart(""); setNewEnd(""); showToast("Period logged! Plan updated.");
  };

  var addTimeOff = function(){
    if(!newTOWeek){ showToast("Select a week"); return; }
    var updated=timeOffWeeks.filter(function(t){ return t.week!==newTOWeek; });
    updated.push({ week:newTOWeek, pct:newTOPct });
    setTimeOffWeeks(updated); saveAll({timeOffWeeks:updated});
    setTimeOffModal(false); showToast("Time off added — plan adjusted!");
  };

  var removeTimeOff = function(wk){
    var updated=timeOffWeeks.filter(function(t){ return t.week!==wk; });
    setTimeOffWeeks(updated); saveAll({timeOffWeeks:updated});
  };

  var card={ background:"#fff",borderRadius:18,padding:"14px",marginBottom:10,border:"1px solid "+P.border,boxShadow:"0 3px 12px rgba(67,97,238,0.06)" };
  var nav=[["dashboard","🏠","Home"],["plan","📋","Plan"],["strava","🟠","Strava"],["cycle","🌸","Cycle"]];

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:P.bg,minHeight:"100vh",paddingBottom:86}}>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,"+P.electric+","+P.violet+")",padding:"16px 16px 14px",color:"#fff",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 20px rgba(67,97,238,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:19,fontWeight:900}}>Bonnie's Marathon</div>
            <div style={{fontSize:10,opacity:0.8}}>Sydney 30 Aug 2026 · Sub 4:00 · Goal 5:41/km</div>
          </div>
          <div style={{textAlign:"right",background:"rgba(255,255,255,0.15)",borderRadius:14,padding:"6px 12px"}}>
            <div style={{fontSize:26,fontWeight:900,lineHeight:1}}>{daysLeft}</div>
            <div style={{fontSize:9,opacity:0.8}}>days to go</div>
          </div>
        </div>
      </div>

      {toast&&<div style={{background:P.teal,color:"#fff",padding:"9px 16px",textAlign:"center",fontSize:12,fontWeight:700}}>{toast}</div>}

      <div style={{padding:"12px 14px"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&<div className="fade-in">

          {/* Goal assessment banner */}
          <div style={{...card,border:"2px solid "+assessment.color+"50",background:assessment.color+"08",padding:"14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{fontSize:14,fontWeight:900,color:assessment.color}}>{assessment.status}</div>
              <div style={{fontSize:10,fontWeight:700,color:assessment.weekColor,background:assessment.weekColor+"18",borderRadius:8,padding:"2px 8px"}}>{assessment.weekStatus}</div>
            </div>
            <div style={{fontSize:11,color:P.textMid,lineHeight:1.6,marginBottom:6}}>{assessment.message}</div>
            <div style={{fontSize:11,fontWeight:700,color:assessment.color}}>💡 {assessment.tip}</div>
          </div>

          {/* Stats strip */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
            {[[P.electric,Object.keys(allRuns).length,"runs"],[P.teal,Math.round(totalKm)+"km","all time"],[P.orange,avgPStr,"avg pace"],[P.violet,"5:41","goal"]].map(function(x){
              return <div key={x[2]} style={{background:"#fff",borderRadius:12,padding:"10px 4px",textAlign:"center",border:"1px solid "+P.border}}>
                <div style={{fontSize:15,fontWeight:900,color:x[0]}}>{x[1]}</div>
                <div style={{fontSize:9,color:P.textSoft,marginTop:1}}>{x[2]}</div>
              </div>;
            })}
          </div>

          {/* Pace card */}
          <div style={{...card,border:"1.5px solid "+P.electric+"30"}}>
            <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Pace vs Goal (Sub 4:00 = 5:41/km)</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div><div style={{fontSize:9,color:P.textSoft}}>Your avg</div><div style={{fontSize:22,fontWeight:900,color:P.orange}}>{avgPStr}<span style={{fontSize:10,color:P.textSoft}}>/km</span></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:P.textSoft}}>Goal</div><div style={{fontSize:22,fontWeight:900,color:P.teal}}>5:41<span style={{fontSize:10,color:P.textSoft}}>/km</span></div></div>
            </div>
            <div style={{height:8,background:P.border,borderRadius:4,overflow:"hidden",marginBottom:6}}>
              <div style={{height:"100%",width:"60%",background:"linear-gradient(90deg,"+P.electric+","+P.orange+")",borderRadius:4}}/>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{fontSize:10,background:P.electric+"10",borderRadius:8,padding:"3px 8px",color:P.electric,fontWeight:600}}>Easy: 6:30–7:00/km</div>
              <div style={{fontSize:10,background:P.orange+"10",borderRadius:8,padding:"3px 8px",color:P.orange,fontWeight:600}}>Tempo: 5:50–6:10/km</div>
              <div style={{fontSize:10,background:P.teal+"10",borderRadius:8,padding:"3px 8px",color:P.teal,fontWeight:600}}>Long: 6:20–6:50/km</div>
            </div>
          </div>

          {/* Progress chart */}
          <div style={card}>
            <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Km Progress · Weeks 1–14 + This Week</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div>
                <div style={{fontSize:9,color:P.textSoft}}>Historical actual</div>
                <div style={{fontSize:18,fontWeight:900,color:P.teal}}>{totalActual.toFixed(1)}km</div>
                <div style={{fontSize:9,color:P.textSoft}}>vs {totalPlanned}km planned</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:P.textSoft}}>All time total</div>
                <div style={{fontSize:18,fontWeight:900,color:P.electric}}>{Math.round(totalKm)}km</div>
                <div style={{fontSize:9,color:P.textSoft}}>inc Strava runs</div>
              </div>
            </div>
            <div style={{height:6,background:P.border,borderRadius:3,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:Math.min(100,totalActual/totalPlanned*100).toFixed(0)+"%",background:"linear-gradient(90deg,"+P.teal+","+P.electric+")",borderRadius:3}}/>
            </div>
            <BarChart pastData={COMPLETED_WEEKS} liveWeek={currentWeek} sessions={sessions}/>
            <div style={{display:"flex",gap:10,marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:P.textSoft}}><div style={{width:8,height:8,background:P.electric+"40",borderRadius:2}}/>Planned</div>
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:P.textSoft}}><div style={{width:8,height:8,background:P.teal,borderRadius:2}}/>Actual</div>
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:P.textSoft}}><div style={{width:8,height:8,border:"1px dashed "+P.electric,borderRadius:2}}/>Current</div>
            </div>
          </div>

          {/* This week checklist */}
          {currentWeek&&(
            <div style={{...card,border:"1.5px solid "+P.electric+"30"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1}}>This Week · {currentWeek.week}</div>
                <div style={{fontSize:11,color:P.electric,fontWeight:700}}>{assessment.weekDone}/{assessment.weekTotal} done</div>
              </div>
              <div style={{height:5,background:P.border,borderRadius:3,overflow:"hidden",marginBottom:10}}>
                <div style={{height:"100%",width:(assessment.weekTotal>0?assessment.weekDone/assessment.weekTotal*100:0)+"%",background:"linear-gradient(90deg,"+P.electric+","+P.teal+")",borderRadius:3,transition:"width 0.4s"}}/>
              </div>
              {currentWeek.sessions.map(function(s,i){
                return <SessionItem key={i} session={s} done={!!sessions[currentWeek.week+"_"+i]} onToggle={function(){ toggleSession(currentWeek.week,i); }} showPace={true}/>;
              })}
              {assessment.weekDone===assessment.weekTotal&&assessment.weekTotal>0&&(
                <button onClick={function(){ closeWeek(currentWeek.week); }}
                  style={{marginTop:10,width:"100%",background:"linear-gradient(90deg,"+P.teal+","+P.electric+")",border:"none",color:"#fff",borderRadius:12,padding:"10px",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                  Close Week & Move to Next ✓
                </button>
              )}
            </div>
          )}

          {/* Upcoming weeks */}
          <div style={card}>
            <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Upcoming Weeks</div>
            {livePlan.slice(currentWeekIdx+1,currentWeekIdx+4).map(function(wk){
              return <div key={wk.week} style={{padding:"8px 0",borderBottom:"1px solid "+P.border}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12}}>{wk.week} <span style={{fontWeight:400,color:P.textSoft,fontSize:11}}>{wk.startDate}</span></div>
                    <div style={{fontSize:10,color:P.textSoft}}>{wk.adjustedTarget}km target{wk.note?" · "+wk.note:""}</div>
                  </div>
                  {wk.phase&&<div style={{fontSize:10,fontWeight:700,color:wk.phase.color,background:wk.phase.color+"18",padding:"2px 8px",borderRadius:8}}>{wk.phase.emoji}</div>}
                </div>
              </div>;
            })}
          </div>

          {/* Cycle strip */}
          <div style={{...card,border:"1.5px solid "+phase.color+"40",background:phase.color+"06"}}>
            <div style={{fontSize:10,color:P.textSoft,marginBottom:2}}>Today · Day {cycleDay} of {cycleLen}</div>
            <div style={{fontSize:15,fontWeight:900,color:phase.color,marginBottom:4}}>{phase.emoji} {phase.phase}</div>
            <div style={{fontSize:11,color:P.textMid,marginBottom:6}}>{phase.training}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {nextPeriod>0&&<div style={{fontSize:10,background:P.coral+"15",color:P.coral,borderRadius:8,padding:"3px 8px",fontWeight:700}}>Period in ~{nextPeriod} days</div>}
              {fertile&&<div style={{fontSize:10,background:P.orange+"15",color:P.orange,borderRadius:8,padding:"3px 8px",fontWeight:700}}>Fertile window now</div>}
              {!fertile&&cycleDay<ovDay&&<div style={{fontSize:10,background:P.teal+"15",color:P.teal,borderRadius:8,padding:"3px 8px",fontWeight:700}}>Ovulation ~{ovDay-cycleDay} days</div>}
            </div>
          </div>

          {!auth&&<div style={{...card,border:"1.5px solid #FC4C0240",background:"#FC4C0208"}}>
            <div style={{fontWeight:800,color:"#FC4C02",marginBottom:6,fontSize:13}}>Connect Strava to sync runs automatically</div>
            <button onClick={function(){ window.location.href="/api/strava-login"; }}
              style={{background:"#FC4C02",border:"none",color:"#fff",borderRadius:12,padding:"10px",fontSize:12,fontWeight:800,cursor:"pointer",width:"100%"}}>
              Connect Strava
            </button>
          </div>}
        </div>}

        {/* ── PLAN TAB ── */}
        {tab==="plan"&&<div className="fade-in">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontWeight:900,fontSize:18}}>Training Plan</div>
              <div style={{fontSize:11,color:P.textSoft}}>Goal 5:41/km · Tap pace badge for details</div>
            </div>
            <button onClick={function(){ setTimeOffModal(true); }}
              style={{background:P.violet,border:"none",color:"#fff",borderRadius:12,padding:"8px 12px",fontSize:11,fontWeight:800,cursor:"pointer"}}>
              + Time Off
            </button>
          </div>

          {timeOffWeeks.length>0&&(
            <div style={{...card,background:P.violet+"08",border:"1px solid "+P.violet+"30"}}>
              <div style={{fontSize:11,fontWeight:800,color:P.violet,marginBottom:6}}>Time off scheduled</div>
              {timeOffWeeks.map(function(t){
                return <div key={t.week} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:11}}>
                  <span style={{color:P.textMid}}>{t.week} — {t.pct}% capacity</span>
                  <button onClick={function(){ removeTimeOff(t.week); }} style={{background:"none",border:"none",color:P.textSoft,cursor:"pointer",fontSize:16}}>✕</button>
                </div>;
              })}

          )}

          {periods.length>0&&<div style={{fontSize:11,color:P.violet,fontWeight:700,marginBottom:8}}>Cycle-synced · plan adapts to your {cycleLen}-day cycle</div>}

          {livePlan.map(function(wk,wkIdx){
            if(closedWeeks[wk.week]&&wkIdx<currentWeekIdx) return null;
            var isExp=expanded===wk.week;
            var done=wk.sessions.filter(function(_,si){ return sessions[wk.week+"_"+si]; }).length;
            var isCurrent=wk.week===currentWeek.week;
            var accent=wk.phase?wk.phase.color:isCurrent?P.electric:P.textMid;
            var isPeak=wk.week==="Week 32";
            return <div key={wk.week} style={{background:"#fff",borderRadius:16,marginBottom:8,border:"1.5px solid "+(isCurrent?P.electric+"50":wk.isTimeOff?P.violet+"30":P.border),overflow:"hidden",opacity:closedWeeks[wk.week]?0.5:1}}>
              <div style={{height:3,background:"linear-gradient(90deg,"+accent+","+accent+"55)"}}/>
              <div onClick={function(){ setExpanded(isExp?null:wk.week); }} style={{padding:"11px 13px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                    <span style={{fontWeight:800,fontSize:13}}>{wk.week}</span>
                    {isCurrent&&<span style={{fontSize:9,background:P.electric+"20",color:P.electric,borderRadius:6,padding:"1px 6px",fontWeight:800}}>NOW</span>}
                    {isPeak&&<span style={{fontSize:9,background:P.yellow+"40",color:"#996600",borderRadius:6,padding:"1px 6px",fontWeight:700}}>PEAK</span>}
                    {wk.isTimeOff&&<span style={{fontSize:9,background:P.violet+"20",color:P.violet,borderRadius:6,padding:"1px 6px",fontWeight:700}}>Holiday</span>}
                    {wk.phase&&<span style={{fontSize:9,background:wk.phase.color+"20",color:wk.phase.color,borderRadius:6,padding:"1px 6px",fontWeight:700}}>{wk.phase.emoji}</span>}
                  </div>
                  <div style={{fontSize:10,color:P.textSoft}}>{wk.startDate} · {wk.adjustedTarget}km{wk.adjustedTarget!==wk.target?" (was "+wk.target+"km)":""} · {done}/{wk.sessions.length} done</div>
                  {wk.note&&<div style={{fontSize:10,color:accent,fontWeight:700}}>{wk.note}</div>}
                </div>
                <div style={{minWidth:32,textAlign:"right"}}>
                  <div style={{fontSize:11,fontWeight:800,color:accent}}>{done}/{wk.sessions.length}</div>
                  <div style={{width:32,height:4,background:accent+"20",borderRadius:2,marginTop:3}}>
                    <div style={{width:(done/wk.sessions.length*100)+"%",height:"100%",background:accent,borderRadius:2}}/>
                  </div>
                </div>
                <div style={{fontSize:12,color:P.textSoft}}>{isExp?"▲":"▼"}</div>
              </div>
              {isExp&&<div style={{padding:"0 13px 12px",borderTop:"1px solid "+P.border}}>
                {wk.phase&&<div style={{background:wk.phase.color+"12",borderRadius:10,padding:"7px 10px",marginBottom:8,fontSize:11,color:wk.phase.color,fontWeight:700}}>
                  {wk.phase.emoji} {wk.phase.phase} · {wk.phase.training}
                </div>}
                {/* Pace guide for this week */}
                <div style={{background:P.electric+"08",borderRadius:10,padding:"7px 10px",marginBottom:8,fontSize:10}}>
                  <div style={{fontWeight:800,color:P.electric,marginBottom:4}}>Target paces this week</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {[["🐣 Easy","6:30–7:00",P.teal],["🔥 Tempo","5:50–6:10",P.orange],["🌟 Long","6:20–6:50",P.electric],["🏁 Race","5:38–5:44",P.violet]].map(function(x){
                      return <div key={x[0]} style={{fontSize:9,fontWeight:700,color:x[2]}}>{x[0]}: <strong>{x[1]}</strong>/km</div>;
                    })}
                  </div>
                </div>
                {wk.sessions.map(function(s,si){
                  return <SessionItem key={si} session={s} done={!!sessions[wk.week+"_"+si]} onToggle={function(){ toggleSession(wk.week,si); }} showPace={true}/>;
                })}
                {isCurrent&&done===wk.sessions.length&&(
                  <button onClick={function(){ closeWeek(wk.week); }}
                    style={{marginTop:10,width:"100%",background:"linear-gradient(90deg,"+P.teal+","+P.electric+")",border:"none",color:"#fff",borderRadius:12,padding:"10px",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                    Close Week & Move to Next ✓
                  </button>
                )}
              </div>}
            </div>;
          })}
        </div>}

        {/* ── STRAVA TAB ── */}
        {tab==="strava"&&<div className="fade-in">
          <div style={{fontWeight:900,fontSize:18,marginBottom:4}}>Strava</div>
          <div style={{fontSize:11,color:P.textSoft,marginBottom:12}}>Your runs synced automatically</div>
          <div style={{background:"linear-gradient(135deg,#FC4C02,#FF8C00)",borderRadius:20,padding:"18px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:16,fontWeight:900,marginBottom:4}}>{auth?"Connected":"Not connected"}</div>
            <div style={{fontSize:11,opacity:0.85,marginBottom:12}}>{auth?Object.keys(stravaRuns).length+" live + "+Object.keys(STRAVA_HISTORY).length+" history":"Connect once, syncs every time"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){ auth?doSync(auth):window.location.href="/api/strava-login"; }}
                style={{background:"rgba(255,255,255,0.25)",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:12,padding:"9px 16px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                {syncing?"Syncing...":auth?"Sync Now":"Connect Strava"}
              </button>
              {auth&&<button onClick={function(){ localStorage.removeItem("bonnie_auth");localStorage.removeItem("bonnie_strava_runs");setAuth(null);setStravaRuns({}); }}
                style={{background:"rgba(0,0,0,0.15)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:12,padding:"9px 12px",color:"rgba(255,255,255,0.7)",fontSize:11,cursor:"pointer"}}>
                Disconnect
              </button>}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
            {[[P.teal,Object.keys(allRuns).length,"runs"],[P.electric,Math.round(totalKm)+"km","total"],[P.orange,avgPStr,"avg pace"]].map(function(x){
              return <div key={x[2]} style={{background:"#fff",borderRadius:12,padding:"10px 6px",textAlign:"center",border:"1px solid "+P.border}}>
                <div style={{fontSize:16,fontWeight:900,color:x[0]}}>{x[1]}</div>
                <div style={{fontSize:9,color:P.textSoft}}>{x[2]}</div>
              </div>;
            })}
          </div>
          {Object.entries(allRuns).sort(function(a,b){ return b[0].localeCompare(a[0]); }).map(function(entry){
            var date=entry[0],run=entry[1];
            var pMin=paceToMin(run.pace); var goalPMin=5.683;
            var onTrack=pMin&&pMin<=goalPMin+0.5;
            return <div key={date} style={{...card,display:"flex",alignItems:"center",gap:12,padding:"11px 13px"}}>
              <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#FC4C02,#FF8C00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🟠</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14}}>{(run.km||0).toFixed(1)}km</div>
                <div style={{fontSize:10,color:P.textSoft}}>{date.substring(0,10)}{run.pace?" · "+run.pace+"/km":""}</div>
                {run.notes&&<div style={{fontSize:10,color:"#FC4C02",fontWeight:700,marginTop:1}}>{run.notes}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                {run.duration&&<div style={{fontSize:11,color:P.textSoft}}>{run.duration}</div>}
                {run.pace&&<div style={{fontSize:9,fontWeight:700,color:onTrack?P.teal:P.orange}}>{onTrack?"On pace":"Build pace"}</div>}
              </div>
            </div>;
          })}
        </div>}

        {/* ── CYCLE TAB ── */}
        {tab==="cycle"&&<div className="fade-in">
          <div style={{fontWeight:900,fontSize:18,marginBottom:2}}>Cycle Tracker</div>
          <div style={{fontSize:11,color:P.textSoft,marginBottom:10}}>Your body, your training</div>

          {/* Cycle length setting */}
          <div style={{...card,border:"1px solid "+P.violet+"30"}}>
            <div style={{fontSize:12,fontWeight:800,marginBottom:8}}>Cycle length</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <input type="number" min="21" max="40" value={cycleLen}
                onChange={function(e){ var v=parseInt(e.target.value)||28; setCycleLen(v); saveAll({cycleLen:v}); }}
                style={{width:70,padding:"8px 10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:16,fontWeight:800,textAlign:"center"}}/>
              <div style={{fontSize:11,color:P.textMid}}>days<br/><span style={{color:P.textSoft}}>Your cycle is {cycleLen} days · next period in ~{nextPeriod} days</span></div>
            </div>
            <div style={{fontSize:10,color:P.textSoft,marginTop:6}}>Update anytime — your marathon plan adjusts automatically</div>
          </div>

          {/* Phase hero */}
          <div style={{background:"linear-gradient(135deg,"+phase.color+","+phase.color+"BB)",borderRadius:22,padding:"18px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:10,opacity:0.8,marginBottom:4}}>Today · Day {cycleDay} of {cycleLen}</div>
            <div style={{fontSize:22,fontWeight:900,marginBottom:4}}>{phase.emoji} {phase.phase}</div>
            <div style={{fontSize:11,opacity:0.9,lineHeight:1.6,marginBottom:10}}>{phase.training}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <div style={{background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:700}}>Period in ~{nextPeriod} days</div>
              {!fertile&&cycleDay<ovDay&&<div style={{background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:700}}>Ovulation ~{ovDay-cycleDay} days</div>}
              {fertile&&<div style={{background:"rgba(255,255,255,0.3)",borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:700}}>Fertile window now!</div>}
            </div>
          </div>

          {/* Cycle strip */}
          <div style={card}>
            <div style={{fontSize:11,fontWeight:800,marginBottom:8}}>Your cycle · Day {cycleDay} of {cycleLen}</div>
            <div style={{display:"flex",gap:1,marginBottom:6}}>
              {Array.from({length:cycleLen},function(_,i){
                var d=i+1, ph=CYCLE_PHASES[getPhaseIdx(d,cycleLen)], isTd=d===cycleDay;
                return <div key={d} style={{flex:1,height:isTd?20:12,background:ph.color+(isTd?"":"55"),borderRadius:2,position:"relative",minWidth:0}}>
                  {isTd&&<div style={{position:"absolute",bottom:"100%",left:"50%",transform:"translateX(-50%)",fontSize:8,color:ph.color}}>▼</div>}
                </div>;
              })}
            </div>
            <div style={{display:"flex",gap:8,fontSize:9,color:P.textSoft,flexWrap:"wrap"}}>
              {CYCLE_PHASES.map(function(ph){ return <span key={ph.phase} style={{color:ph.color,fontWeight:700}}>{ph.emoji} {ph.phase}</span>; })}
            </div>
          </div>

          {/* Info grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {[{icon:"💧",title:"Discharge",body:phase.discharge,color:phase.color},{icon:"🌡️",title:"Fertility",body:phase.fertility,color:fertile?P.orange:P.teal},{icon:"🧠",title:"Mood",body:phase.mood,color:P.violet},{icon:"🥗",title:"Nutrition",body:phase.nutrition,color:P.teal}].map(function(item){
              return <div key={item.title} style={{background:"#fff",borderRadius:14,padding:"11px 10px",border:"1px solid "+P.border}}>
                <div style={{fontSize:18,marginBottom:3}}>{item.icon}</div>
                <div style={{fontSize:11,fontWeight:800,color:item.color,marginBottom:3}}>{item.title}</div>
                <div style={{fontSize:10,color:P.textMid,lineHeight:1.5}}>{item.body}</div>
              </div>;
            })}
          </div>

          {/* Symptoms */}
          <div style={card}>
            <div style={{fontSize:12,fontWeight:800,marginBottom:8}}>Common symptoms this phase</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {phase.symptoms.map(function(s){ return <div key={s} style={{background:phase.color+"15",color:phase.color,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600}}>{s}</div>; })}
            </div>
          </div>

          {/* Log period */}
          <div style={{...card,border:"1.5px solid "+P.coral+"40",background:P.coral+"06"}}>
            <div style={{fontWeight:800,fontSize:13,color:P.coral,marginBottom:10}}>Log a Period</div>
            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:10,color:P.textSoft,marginBottom:4}}>Start date</div>
                <input type="date" value={newStart} onChange={function(e){ setNewStart(e.target.value); }}
                  style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:13}}/>
              </div>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:10,color:P.textSoft,marginBottom:4}}>End date</div>
                <input type="date" value={newEnd} onChange={function(e){ setNewEnd(e.target.value); }}
                  style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:13}}/>
              </div>
            </div>
            <button onClick={savePeriod}
              style={{background:P.coral,border:"none",color:"#fff",borderRadius:12,padding:"10px",fontSize:13,fontWeight:800,cursor:"pointer",width:"100%"}}>
              Save Period
            </button>
          </div>

          {/* Period history */}
          {periods.length>0&&<div style={card}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>Period history</div>
            {periods.slice().reverse().map(function(p){
              var len=p.end&&p.end!==p.start?Math.floor((new Date(p.end)-new Date(p.start))/86400000)+1:1;
              return <div key={p.start} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid "+P.border}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700}}>{p.start}{p.end&&p.end!==p.start?" to "+p.end:""}</div>
                  <div style={{fontSize:10,color:P.textSoft}}>{len} day{len!==1?"s":""}</div>
                </div>
                <button onClick={function(){ var u=periods.filter(function(x){ return x.start!==p.start; }); setPeriods(u); saveAll({periods:u}); }}
                  style={{background:"none",border:"none",color:P.textSoft,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>✕</button>
              </div>;
            })}
          </div>}

          {/* Full guide */}
          <div style={{fontWeight:800,fontSize:13,marginBottom:8,marginTop:4}}>Full Cycle Guide</div>
          {CYCLE_PHASES.map(function(ph,i){
            var active=i===phaseIdx;
            return <div key={i} style={{...card,border:"1.5px solid "+ph.color+(active?"50":"18"),background:active?ph.color+"06":"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{fontWeight:800,color:ph.color}}>{ph.emoji} {ph.phase}</div>
                <div style={{fontSize:10,color:P.textSoft}}>{i===3?"Days 18-"+cycleLen:ph.phase==="Menstrual"?"Days 1-5":ph.phase==="Follicular"?"Days 6-"+(cycleLen-14-1):"Days "+(cycleLen-14)+" - "+(cycleLen-10)}</div>
              </div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Training:</strong> {ph.training}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Discharge:</strong> {ph.discharge}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Fertility:</strong> {ph.fertility}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Mood:</strong> {ph.mood}</div>
              <div style={{fontSize:11,color:P.textMid}}><strong>Nutrition:</strong> {ph.nutrition}</div>
            </div>;
          })}
        </div>}

      </div>

      {/* ── TIME OFF MODAL ── */}
      {timeOffModal&&(
        <div className="modal-bg" onClick={function(e){ if(e.target===e.currentTarget) setTimeOffModal(false); }}>
          <div className="modal">
            <div style={{fontWeight:900,fontSize:18,marginBottom:4}}>Add Time Off</div>
            <div style={{fontSize:11,color:P.textSoft,marginBottom:16}}>Holiday or low-activity week — plan adjusts km automatically</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Which week?</div>
              <select value={newTOWeek} onChange={function(e){ setNewTOWeek(e.target.value); }}
                style={{width:"100%",padding:"10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:13}}>
                <option value="">Select week...</option>
                {BASE_PLAN.map(function(w){ return <option key={w.week} value={w.week}>{w.week} · {w.startDate}</option>; })}
              </select>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Training capacity: <strong style={{color:P.violet}}>{newTOPct}%</strong></div>
              <input type="range" min="0" max="80" value={newTOPct} onChange={function(e){ setNewTOPct(parseInt(e.target.value)); }}
                style={{width:"100%"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:P.textSoft,marginTop:4}}>
                <span>0% (full rest)</span><span>40% (half)</span><span>80% (light)</span>
              </div>
              {newTOWeek&&<div style={{marginTop:8,fontSize:11,color:P.violet,fontWeight:700}}>
                Target km: {Math.round((BASE_PLAN.find(function(w){ return w.week===newTOWeek; })||{target:0}).target*newTOPct/100)}km (vs normal {(BASE_PLAN.find(function(w){ return w.week===newTOWeek; })||{target:0}).target}km)
              </div>}
            </div>
            <button onClick={addTimeOff}
              style={{width:"100%",background:P.violet,border:"none",color:"#fff",borderRadius:12,padding:"12px",fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:8}}>
              Save Time Off
            </button>
            <button onClick={function(){ setTimeOffModal(false); }}
              style={{width:"100%",background:"none",border:"1.5px solid "+P.border,borderRadius:12,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",color:P.textMid}}>
              Cancel
            </button>
          </div>
        </div>
      )}

      {/* Bottom nav */}
      <div className="bottom-nav">
        {nav.map(function(item){
          var id=item[0],icon=item[1],label=item[2],active=tab===id;
          return <button key={id} onClick={function(){ setTab(id); }} style={{flex:1,padding:"8px 2px 6px",background:"transparent",border:"none",color:active?P.electric:P.textSoft,fontSize:9,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontWeight:active?800:500,position:"relative"}}>
            {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,borderRadius:"0 0 4px 4px",background:P.electric}}/>}
            <div style={{fontSize:active?22:18}}>{icon}</div>
            <span>{label}</span>
          </button>;
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
