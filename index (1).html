    // ── Helper: m/s → MM:SS pace ──────────────────────────────────────────────
    function mpsToMmSs(mps) {
      if (!mps || isNaN(mps) || mps <= 0) return "";
      const secsPerKm = 1000 / mps;
      const m = Math.floor(secsPerKm / 60);
      const s = Math.round(secsPerKm % 60);
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    // ── Helper: parse Strava activities from API into our run format ───────────
    function parseStravaActivities(activities) {
      const runs = {};
      (activities || [])
        .filter(a => a.type === "Run" && a.distance >= 500)
        .forEach(a => {
          const date = new Date(a.start_date_local);
          const dateKey = date.toISOString().substring(0, 10);
          // Use timestamp suffix for same-day runs
          const key = runs[dateKey] ? `${dateKey}-${a.id}` : dateKey;
          runs[key] = {
            km: +(a.distance / 1000).toFixed(2),
            pace: mpsToMmSs(a.average_speed),
            duration: (() => {
              const m = Math.floor(a.moving_time / 60);
              const s = a.moving_time % 60;
              return `${m}:${s.toString().padStart(2,"0")}`;
            })(),
            elevation: String(Math.round(a.total_elevation_gain || 0)),
            notes: a.name || "Run",
            source: "strava",
          };
        });
      return runs;
    }

    // ── Auth helpers ───────────────────────────────────────────────────────────
    function saveAuth(auth) {
      try { localStorage.setItem("bonnie_strava_auth", JSON.stringify(auth)); } catch {}
    }
    function loadAuth() {
      try { return JSON.parse(localStorage.getItem("bonnie_strava_auth")); } catch { return null; }
    }
    function clearAuth() {
      try { localStorage.removeItem("bonnie_strava_auth"); } catch {}
    }

    // ── Shared UI components ──────────────────────────────────────────────────
    function Counter({ to, duration=1000 }) {
      const [val, setVal] = useState(0);
      useEffect(() => {
        let start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          setVal(Math.round(to * p));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [to]);
      return <span>{val}</span>;
    }

    function FloatingParticles() {
      const items = ["🏃‍♀️","✨","⚡","🎯","💨","🌟","🏅","💪","🔥","⭐"];
      return (
        <div style={{ position:"fixed", inset:0, pointerEvents:"none", overflow:"hidden", zIndex:0 }}>
          <style>{`@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.35}90%{opacity:.15}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}`}</style>
          {items.map((e,i) => <div key={i} style={{ position:"absolute", bottom:-40, left:`${6+i*9}%`, fontSize:12+(i%3)*3, animation:`floatUp ${14+i*2}s ${i*1.8}s infinite linear`, opacity:0 }}>{e}</div>)}
        </div>
      );
    }

    function Ring({ pct, size=80, stroke=7, color, label, sub }) {
      const r = (size-stroke*2)/2, circ = 2*Math.PI*r;
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
          <div style={{ position:"relative", width:size, height:size }}>
            <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${color}20`} strokeWidth={stroke}/>
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
                strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
                style={{ transition:"stroke-dashoffset 1.2s ease" }}/>
            </svg>
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div style={{ fontSize:14, fontWeight:800, color:P.textDark }}>{pct}<span style={{ fontSize:9 }}>%</span></div>
            </div>
          </div>
          <div style={{ fontSize:11, fontWeight:700, color:P.textDark, textAlign:"center" }}>{label}</div>
          {sub && <div style={{ fontSize:9, color:P.textSoft, textAlign:"center" }}>{sub}</div>}
        </div>
      );
    }

      const [expandedWeek, setExpandedWeek] = useState(null);

      // All runs = baked-in history + live Strava (live wins on same date)
      const allRuns = { ...STRAVA_HISTORY, ...stravaRuns };
      const stravaCount = Object.keys(stravaRuns).length;
      const historyCount = Object.keys(STRAVA_HISTORY).length;

      // ── On mount: check for auth in URL hash, or load from storage ──────────
      useEffect(() => {
        // Check if Strava just redirected back with auth
        const urlParams = new URLSearchParams(window.location.search);
        const authParam = urlParams.get("auth");
        const errorParam = urlParams.get("error");

        if (authParam) {
          try {
            const authData = JSON.parse(decodeURIComponent(authParam));
            saveAuth(authData);
            setAuth(authData);
            // Clean URL
            window.history.replaceState({}, "", "/");
            showToast(`👋 Connected as ${authData.athlete?.firstname || "Bonnie"}!`);
            fetchStravaRuns(authData);
          } catch (e) { console.error("Auth parse error", e); }
        } else if (errorParam) {
          showToast("❌ Strava connection failed — try again");
          window.history.replaceState({}, "", "/");
        } else {
          // Load saved auth
          const saved = loadAuth();
          if (saved) {
            setAuth(saved);
            fetchStravaRuns(saved);
          }
        }

        // Load other saved state
        try {
          const sessions = localStorage.getItem("bonnie_sessions");
          if (sessions) setCompletedSessions(JSON.parse(sessions));
          const cycle = localStorage.getItem("bonnie_cycle");
          if (cycle) setCycleDay(parseInt(cycle));
          const savedRuns = localStorage.getItem("bonnie_strava_runs");
          if (savedRuns) setStravaRuns(JSON.parse(savedRuns));
        } catch {}
      }, []);

      // ── Fetch runs from Strava via our serverless proxy ───────────────────────
      const fetchStravaRuns = async (authData) => {
        setSyncStatus("loading");
        try {
          const a = authData || auth;
          if (!a) throw new Error("Not connected");

          // Fetch up to 200 recent activities (2 pages of 100)
          const params = new URLSearchParams({
            path: "/api/v3/athlete/activities?per_page=100&page=1",
            access_token: a.access_token,
            refresh_token: a.refresh_token,
            expires_at: a.expires_at,
          });
          const res = await fetch(`${API_BASE}/strava-api?${params}`);
          const json = await res.json();

          if (json.newTokenData) {
            const updated = { ...a, ...json.newTokenData };
            saveAuth(updated);
            setAuth(updated);
          }

          // Page 2
          const params2 = new URLSearchParams({
            path: "/api/v3/athlete/activities?per_page=100&page=2",
            access_token: json.newTokenData?.access_token || a.access_token,
            refresh_token: json.newTokenData?.refresh_token || a.refresh_token,
            expires_at: json.newTokenData?.expires_at || a.expires_at,
          });
          const res2 = await fetch(`${API_BASE}/strava-api?${params2}`);
          const json2 = await res2.json();

          const allActivities = [...(json.data || []), ...(json2.data || [])];
          const runs = parseStravaActivities(allActivities);

          // Filter to marathon training (Dec 2025+)
          const filtered = {};
          Object.entries(runs).forEach(([k, v]) => {
            if (k >= "2025-12-01") filtered[k] = v;
          });

          setStravaRuns(filtered);
          localStorage.setItem("bonnie_strava_runs", JSON.stringify(filtered));
          setSyncStatus("ok");
          showToast(`🟠 ${Object.keys(filtered).length} runs synced from Strava!`);
        } catch (e) {
          setSyncStatus("error");
          console.error("Strava sync error:", e);
          showToast("❌ Sync failed — " + e.message);
        }
      };

      const handleConnect = () => {
        window.location.href = `${API_BASE}/strava-login`;
      };

      const handleDisconnect = () => {
        clearAuth();
        setAuth(null);
        setStravaRuns({});
        localStorage.removeItem("bonnie_strava_runs");
        setSyncStatus("idle");
        showToast("Disconnected from Strava");
      };

      const toggleSession = (wk, idx) => {
        const k = `${wk}_${idx}`;
        const u = { ...completedSessions, [k]: !completedSessions[k] };
        setCompletedSessions(u);
        try { localStorage.setItem("bonnie_sessions", JSON.stringify(u)); } catch {}
      };

      // ── Stats ─────────────────────────────────────────────────────────────────
      const raceDate = new Date("2026-08-30");
      const today = new Date();
      const daysToRace = Math.ceil((raceDate - today) / 86400000);
      const progressPct = Math.round((14/40)*100);
      const totalPlannedKm = PLAN_WEEKS.reduce((s,w)=>s+w.target,0) + COMPLETED_WEEKS.reduce((s,w)=>s+w.planned,0);
      const histKm = Object.values(STRAVA_HISTORY).reduce((s,r)=>s+r.km,0);
      const liveKm = Object.values(stravaRuns).reduce((s,r)=>s+r.km,0);
      const totalKm = +(COMPLETED_WEEKS.reduce((s,w)=>s+w.actual,0) + (liveKm || histKm)).toFixed(1);
      const kmProgressPct = Math.round((totalKm / totalPlannedKm) * 100);
      const cyclePhaseIdx = cycleDay<=5?0:cycleDay<=13?1:cycleDay<=17?2:3;
      const currentPhase = CYCLE_PHASES[cyclePhaseIdx];
      const currentAvgPace = 6.2;
      const goalPace = 5 + 41/60;

      // ── Shared styles ─────────────────────────────────────────────────────────
      const card = { background:P.white, borderRadius:20, padding:"16px", marginBottom:12, border:`1px solid ${P.border}`, boxShadow:"0 4px 20px rgba(67,97,238,0.07)" };
      const pill = (c) => ({ background:`${c}18`, border:`1.5px solid ${c}40`, borderRadius:20, padding:"3px 10px", fontSize:10, color:c, display:"inline-block", fontWeight:700 });
      const btnPrimary = (c) => ({ background:`linear-gradient(135deg,${c},${c}CC)`, border:"none", color:"#fff", borderRadius:14, padding:"12px 20px", fontSize:13, cursor:"pointer", fontWeight:800, boxShadow:`0 6px 20px ${c}40`, fontFamily:"inherit" });
      const sectionTitle = { fontSize:14, fontWeight:800, color:P.textDark, marginBottom:3 };
      const sectionSub = { fontSize:11, color:P.textSoft, marginBottom:14 };

      const navItems = [
        { id:"dashboard", icon:"🏠", label:"Home" },
        { id:"plan",      icon:"📋", label:"Plan" },
        { id:"strava",    icon:"🟠", label:"Strava" },
        { id:"cycle",     icon:"🌸", label:"Cycle" },
        { id:"nutrition", icon:"🥗", label:"Food" },
      ];

      const fmtPace = (p) => { const m=Math.floor(p), s=Math.round((p-m)*60); return `${m}:${s.toString().padStart(2,"0")}`; };

      return (
        <div style={{ fontFamily:"'Nunito','Poppins',system-ui,sans-serif", background:P.bg, minHeight:"100vh", color:P.textDark }}>
          <FloatingParticles/>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
            * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
            button:active { transform: scale(0.97); }
            @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
            .tab-content { animation: popIn 0.2s ease; }
            .app-shell { display: flex; min-height: 100vh; }
            .sidebar-nav { display: none; }
            .bottom-nav { display: flex; }
            .main-wrap { width:100%; padding: 0 14px 86px; }
            @media(min-width:768px){
              .sidebar-nav { display:flex; flex-direction:column; width:200px; min-width:200px; background:${P.white}; border-right:1.5px solid ${P.border}; padding:28px 12px; position:sticky; top:0; height:100vh; box-shadow:2px 0 16px rgba(67,97,238,0.06); }
              .bottom-nav { display:none !important; }
              .mobile-header { display:none !important; }
              .main-wrap { max-width:860px; margin:0 auto; padding:28px 32px 40px; flex:1; }
              .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
              .dash-full { grid-column:1/-1; }
            }
          `}</style>

          <div className="app-shell">
            {/* Sidebar (desktop) */}
            <div className="sidebar-nav">
              <div style={{ marginBottom:24, paddingLeft:8 }}>
                <div style={{ fontSize:17, fontWeight:900 }}>Bonnie's</div>
                <div style={{ fontSize:17, fontWeight:900, background:`linear-gradient(135deg,${P.electric},${P.violet})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Marathon 🏅</div>
                <div style={{ fontSize:10, color:P.textSoft, marginTop:3 }}>Sydney · 30 Aug 2026</div>
              </div>
              {navItems.map(({id,icon,label}) => {
                const active = tab===id;
                return (
                  <button key={id} onClick={()=>setTab(id)} style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"10px 12px", marginBottom:4, background:active?`${P.electric}12`:"transparent", border:"none", borderRadius:14, color:active?P.electric:P.textMid, fontSize:13, cursor:"pointer", fontWeight:active?800:600, fontFamily:"inherit", textAlign:"left" }}>
                    <div style={{ width:32, height:32, borderRadius:10, background:active?`${P.electric}20`:P.border, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15 }}>{icon}</div>
                    {label}
                  </button>
                );
              })}
              <div style={{ marginTop:"auto", background:`linear-gradient(135deg,${P.electric},${P.violet})`, borderRadius:16, padding:"14px", textAlign:"center" }}>
                <div style={{ fontSize:9, color:"rgba(255,255,255,0.7)", textTransform:"uppercase", letterSpacing:1, marginBottom:2 }}>Days to race</div>
                <div style={{ fontSize:36, fontWeight:900, color:"#fff", lineHeight:1 }}><Counter to={daysToRace}/></div>
                <div style={{ fontSize:10, color:"rgba(255,255,255,0.7)", marginTop:2 }}>30 Aug 2026 🏁</div>
              </div>
            </div>

            {/* Main content */}
            <div className="main-wrap">
              {/* Mobile header */}
              <div className="mobile-header" style={{ paddingTop:20, paddingBottom:14, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontSize:22, fontWeight:900, lineHeight:1.1 }}>Bonnie's<br/>
                    <span style={{ background:`linear-gradient(135deg,${P.electric},${P.violet})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Marathon 🏅</span>
                  </div>
                  <div style={{ fontSize:10, color:P.textSoft, marginTop:4 }}>Sydney · 30 Aug 2026 · Sub 4:00 🎯</div>
                </div>
                <div style={{ width:48, height:48, borderRadius:16, background:`linear-gradient(135deg,${P.electric},${P.violet})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🏃‍♀️</div>
              </div>

              {/* Toast */}
              {toast && <div style={{ background:`linear-gradient(135deg,${P.teal}20,${P.teal}10)`, border:`1.5px solid ${P.teal}50`, borderRadius:14, padding:"11px 16px", marginBottom:12, textAlign:"center", color:P.teal, fontSize:13, fontWeight:800 }}>{toast}</div>}

              {/* ── DASHBOARD ── */}
              {tab==="dashboard" && (
                <div className="tab-content">
                  <div className="dash-grid">
                    {/* Countdown hero */}
                    <div className="dash-full" style={{ background:`linear-gradient(135deg,${P.electric},${P.violet})`, borderRadius:24, padding:"22px 20px", marginBottom:12, position:"relative", overflow:"hidden", boxShadow:`0 10px 40px ${P.electric}35` }}>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,0.7)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:4 }}>Race day countdown</div>
                      <div style={{ fontSize:58, fontWeight:900, color:"#fff", lineHeight:1, marginBottom:4 }}><Counter to={daysToRace}/></div>
                      <div style={{ fontSize:13, color:"rgba(255,255,255,0.8)", marginBottom:16 }}>days to go · Sunday 30 Aug 2026 🏁</div>
                      <div style={{ height:8, background:"rgba(255,255,255,0.2)", borderRadius:4, overflow:"hidden", marginBottom:6 }}>
                        <div style={{ height:"100%", width:`${progressPct}%`, background:"rgba(255,255,255,0.85)", borderRadius:4 }}/>
                      </div>
                      <div style={{ fontSize:10, color:"rgba(255,255,255,0.7)" }}>Week 14 of 40 · {progressPct}% complete</div>
                    </div>

                    {/* Stat rings */}
                    <div style={{ ...card, display:"flex", justifyContent:"space-around", padding:"20px 10px" }}>
                      <Ring pct={kmProgressPct} size={78} color={P.electric} label={`${totalKm} km`} sub={`of ~${totalPlannedKm}`}/>
                      <Ring pct={Math.round(((Object.keys(allRuns).length)/180)*100)} size={78} color={P.orange} label={`${Object.keys(allRuns).length} runs`} sub="logged"/>
                      <Ring pct={progressPct} size={78} color={P.teal} label="14 / 40" sub="weeks"/>
                    </div>

                    {/* Pace vs goal */}
                    <div style={card}>
                      <div style={{ fontSize:10, fontWeight:800, color:P.textSoft, marginBottom:10, textTransform:"uppercase", letterSpacing:1.2 }}>⚡ Pace vs Goal</div>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                        <div><div style={{ fontSize:10, color:P.textSoft }}>Current avg</div><div style={{ fontSize:24, fontWeight:800 }}>{fmtPace(currentAvgPace)}<span style={{ fontSize:11, color:P.textSoft }}>/km</span></div></div>
                        <div style={{ textAlign:"right" }}><div style={{ fontSize:10, color:P.textSoft }}>Goal</div><div style={{ fontSize:24, fontWeight:800, color:P.electric }}>{fmtPace(goalPace)}<span style={{ fontSize:11, color:P.textSoft }}>/km</span></div></div>
                      </div>
                      <div style={{ height:8, background:`${P.electric}15`, borderRadius:4, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:"60%", background:`linear-gradient(90deg,${P.electric},${P.orange})`, borderRadius:4 }}/>
                      </div>
                      <div style={{ fontSize:11, color:P.orange, fontWeight:700, marginTop:6 }}>Keep building! ⚡</div>
                    </div>

                    {/* Strava sync status card */}
                    <div style={{ ...card, background:auth?`${P.teal}08`:`${P.orange}08`, border:`1.5px solid ${auth?P.teal:P.orange}30` }}>
                      <div style={{ fontSize:11, fontWeight:800, color:auth?P.teal:P.orange, marginBottom:6 }}>
                        {auth ? "🟠 Strava Connected" : "🟠 Connect Strava"}
                      </div>
                      <div style={{ fontSize:11, color:P.textMid, marginBottom:10 }}>
                        {auth
                          ? `${stravaCount > 0 ? stravaCount + " live runs synced" : "Syncing..."} + ${historyCount} history runs`
                          : "Tap to connect and auto-sync all your runs"}
                      </div>
                      <button onClick={auth ? () => fetchStravaRuns() : handleConnect}
                        style={{ ...btnPrimary(auth?P.teal:P.orange), padding:"9px 16px", fontSize:12, width:"100%" }}>
                        {syncStatus==="loading" ? "⏳ Syncing…" : auth ? "🔄 Refresh Runs" : "Connect Strava 🟠"}
                      </button>
                    </div>

                    {/* Cycle phase */}
                    <div className="dash-full" style={{ ...card, display:"flex", justifyContent:"space-between", alignItems:"center", border:`1.5px solid ${currentPhase.color}30`, background:`${currentPhase.color}08` }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:10, color:P.textSoft, marginBottom:3 }}>🌸 Cycle phase · Day {cycleDay}</div>
                        <div style={{ fontSize:17, fontWeight:900, color:currentPhase.color, marginBottom:4 }}>{currentPhase.phase}</div>
                        <div style={{ fontSize:11, color:P.textMid, lineHeight:1.5 }}>{currentPhase.training}</div>
                      </div>
                      <div style={{ fontSize:36, marginLeft:12 }}>{["🩸","🌷","🌺","🍂"][cyclePhaseIdx]}</div>
                    </div>
                  </div>
                  <div style={{ textAlign:"center", padding:"4px 0 8px", fontSize:12, color:P.textSoft, fontStyle:"italic" }}>
                    "She believed she could, so she did." ✨
                  </div>
                </div>
              )}

              {/* ── STRAVA TAB ── */}
              {tab==="strava" && (
                <div className="tab-content">
                  <div style={sectionTitle}>🟠 Strava</div>
                  <div style={sectionSub}>Your runs, automatically synced</div>

                  {/* Connection hero */}
                  <div style={{ background:`linear-gradient(135deg,#FC4C02,#FF8C00)`, borderRadius:22, padding:"20px", marginBottom:14, boxShadow:"0 10px 30px rgba(252,76,2,0.3)", position:"relative", overflow:"hidden" }}>
                    <div style={{ position:"absolute", top:-20, right:-20, width:90, height:90, borderRadius:"50%", background:"rgba(255,255,255,0.08)" }}/>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.8)", fontWeight:700, marginBottom:6 }}>STRAVA CONNECTION</div>
                    <div style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:4 }}>
                      {auth ? `✅ Connected${auth.athlete?.firstname ? " · " + auth.athlete.firstname : ""}` : "🔗 Not connected"}
                    </div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.75)", marginBottom:16 }}>
                      {auth
                        ? `${stravaCount} live runs synced · ${historyCount} history loaded`
                        : "Connect once — syncs automatically every time you open the app"}
                    </div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {auth ? (
                        <>
                          <button onClick={() => fetchStravaRuns()} style={{ background:"rgba(255,255,255,0.25)", border:"1.5px solid rgba(255,255,255,0.4)", borderRadius:12, padding:"10px 18px", color:"#fff", fontSize:13, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>
                            {syncStatus==="loading" ? "⏳ Syncing…" : "🔄 Sync Now"}
                          </button>
                          <button onClick={handleDisconnect} style={{ background:"rgba(0,0,0,0.15)", border:"1.5px solid rgba(255,255,255,0.2)", borderRadius:12, padding:"10px 14px", color:"rgba(255,255,255,0.7)", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                            Disconnect
                          </button>
                        </>
                      ) : (
                        <button onClick={handleConnect} style={{ background:"rgba(255,255,255,0.25)", border:"1.5px solid rgba(255,255,255,0.4)", borderRadius:12, padding:"10px 18px", color:"#fff", fontSize:13, fontWeight:800, cursor:"pointer", fontFamily:"inherit" }}>
                          Connect Strava 🟠
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Stats strip */}
                  <div style={{ display:"flex", gap:8, marginBottom:14 }}>
                    {[
                      [P.orange, `${stravaCount}`, "live from Strava"],
                      [P.electric, `${historyCount}`, "history loaded"],
                      [P.teal, `${Object.keys(allRuns).length}`, "total runs"],
                    ].map(([c,v,l]) => (
                      <div key={l} style={{ flex:1, background:`${c}12`, border:`1.5px solid ${c}30`, borderRadius:14, padding:"11px 8px", textAlign:"center" }}>
                        <div style={{ fontSize:16, fontWeight:900, color:c }}>{v}</div>
                        <div style={{ fontSize:9, color:P.textSoft, marginTop:2 }}>{l}</div>
                      </div>
                    ))}
                  </div>

                  {/* All runs list */}
                  <div style={{ fontSize:13, fontWeight:800, color:P.textDark, marginBottom:8 }}>All runs (newest first)</div>
                  {Object.entries(allRuns).length === 0 ? (
                    <div style={{ ...card, textAlign:"center", padding:32, color:P.textSoft, fontSize:13 }}>
                      <div style={{ fontSize:36, marginBottom:10 }}>🏃‍♀️</div>
                      Connect Strava above to see your runs!
                    </div>
                  ) : (
                    Object.entries(allRuns)
                      .sort((a,b) => b[0].localeCompare(a[0]))
                      .map(([date, run]) => (
                        <div key={date} style={{ ...card, display:"flex", justifyContent:"space-between", alignItems:"center", padding:"13px 15px" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                            <div style={{ width:42, height:42, borderRadius:14, background:"linear-gradient(135deg,#FC4C02,#FF8C00)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>🟠</div>
                            <div>
                              <div style={{ fontSize:15, fontWeight:800, color:P.textDark }}>{run.km?.toFixed ? run.km.toFixed(1) : run.km} km</div>
                              <div style={{ fontSize:10, color:P.textSoft }}>{date.substring(0,10)}{run.pace ? ` · ${run.pace}/km` : ""}{run.elevation && run.elevation!=="0" ? ` · ↑${run.elevation}m` : ""}</div>
                              {run.notes && <div style={{ fontSize:10, color:"#FC4C02", marginTop:2, fontWeight:700 }}>{run.notes}</div>}
                            </div>
                          </div>
                          {run.duration && <div style={{ fontSize:11, color:P.textSoft, fontWeight:600 }}>{run.duration}</div>}
                        </div>
                      ))
                  )}
                </div>
              )}

              {/* ── TRAINING PLAN ── */}
              {tab==="plan" && (
                <div className="tab-content">
                  <div style={sectionTitle}>🗓️ Training Plan</div>
                  <div style={sectionSub}>Weeks 15–40 · Tap to expand · ⭐ = goal pace 5:41/km</div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
                    {[[P.coral,"🩸 Period"],[P.orange,"⚠️ Pre-period"],[P.electric,"⭐ Tempo"],[P.yellow,"🏆 Peak"]].map(([c,l])=>(
                      <span key={l} style={pill(c)}>{l}</span>
                    ))}
                  </div>
                  {PLAN_WEEKS.map((wk) => {
                    const isExp = expandedWeek===wk.week;
                    const done = wk.sessions.filter((_,si)=>completedSessions[`${wk.week}_${si}`]).length;
                    const pct = Math.round((done/wk.sessions.length)*100);
                    const isPeak = wk.week==="Week 32";
                    const accentColor = wk.period==="period"?P.coral:wk.period==="pre"?P.orange:isPeak?P.yellow:P.electric;
                    return (
                      <div key={wk.week} style={{ background:P.white, border:`1.5px solid ${accentColor}30`, borderRadius:18, marginBottom:8, overflow:"hidden", boxShadow:"0 2px 12px rgba(67,97,238,0.06)" }}>
                        <div style={{ height:3, background:`linear-gradient(90deg,${accentColor},${accentColor}60)` }}/>
                        <div onClick={()=>setExpandedWeek(isExp?null:wk.week)} style={{ padding:"12px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:10 }}>
                          <div style={{ flex:1 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap", marginBottom:3 }}>
                              <span style={{ fontSize:14, fontWeight:800 }}>{wk.week}</span>
                              {wk.period==="period"&&<span style={pill(P.coral)}>🩸 Period</span>}
                              {wk.period==="pre"&&<span style={pill(P.orange)}>⚠️ Pre</span>}
                              {isPeak&&<span style={pill(P.yellow)}>🏆 PEAK</span>}
                            </div>
                            <div style={{ fontSize:10, color:P.textSoft }}>{wk.dates} · {wk.target} km target</div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontSize:12, fontWeight:800, color:accentColor }}>{done}/{wk.sessions.length}</div>
                            <div style={{ width:40, height:4, background:`${accentColor}20`, borderRadius:2, marginTop:4 }}>
                              <div style={{ width:`${pct}%`, height:"100%", background:accentColor, borderRadius:2 }}/>
                            </div>
                          </div>
                          <div style={{ fontSize:16, color:P.textSoft, marginLeft:4 }}>{isExp?"▲":"▼"}</div>
                        </div>
                        {isExp && (
                          <div style={{ padding:"0 14px 14px" }}>
                            {wk.sessions.map((s,si) => {
                              const done = completedSessions[`${wk.week}_${si}`];
                              const isTempo = s.includes("⭐");
                              const c = isTempo?P.electric:P.teal;
                              return (
                                <div key={si} onClick={()=>toggleSession(wk.week,si)}
                                  style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", borderBottom:`1px solid ${P.border}`, cursor:"pointer" }}>
                                  <div style={{ width:24, height:24, borderRadius:"50%", border:`2px solid ${done?c:P.borderMid}`, background:done?c:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" }}>
                                    {done && <span style={{ color:"#fff", fontSize:12, fontWeight:900 }}>✓</span>}
                                  </div>
                                  <span style={{ fontSize:12, color:done?P.textSoft:P.textDark, textDecoration:done?"line-through":"none", fontWeight:done?400:600 }}>{s}</span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

                    <div style={{ fontSize:22, fontWeight:900, color:"#fff", marginBottom:6 }}>{currentPhase.phase}</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.85)", lineHeight:1.55 }}>{currentPhase.training}</div>
                  </div>

                    <div style={{ fontSize:12, fontWeight:800, color:P.textDark, marginBottom:10 }}>Cycle day {cycleDay} of 28</div>

                      {CYCLE_PHASES.map((ph,i) => (
                        <div key={i} style={{ flex:[5,8,4,11][i], height:8, background:ph.color, borderRadius:4, opacity:cyclePhaseIdx===i?1:0.3 }}/>
                      ))}
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:P.textSoft, marginTop:4 }}>
                      {CYCLE_PHASES.map(ph=><span key={ph.phase}>{ph.days}</span>)}

                  </div>
                  {CYCLE_PHASES.map((ph,i) => (
                    <div key={i} style={{ ...card, border:`1.5px solid ${ph.color}30`, background:i===cyclePhaseIdx?`${ph.color}08`:P.white }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6 }}>
                        <div style={{ fontSize:13, fontWeight:800, color:ph.color }}>{ph.phase}</div>
                        <span style={{ fontSize:9, color:P.textSoft }}>{ph.days}</span>
                      </div>
                      <div style={{ fontSize:11, color:P.textMid, lineHeight:1.6, marginBottom:6 }}><strong>Training:</strong> {ph.training}</div>
                      <div style={{ fontSize:11, color:P.textMid, lineHeight:1.6 }}><strong>Nutrition:</strong> {ph.nutrition}</div>
                    </div>

                </div>

                  <div style={sectionTitle}>🥗 Race Day Nutrition</div>
                  <div style={sectionSub}>Sydney Marathon · 30 Aug 2026</div>
                  <div style={{ background:`linear-gradient(135deg,${P.orange},${P.yellow})`, borderRadius:22, padding:"20px", marginBottom:14, boxShadow:`0 10px 30px ${P.orange}30` }}>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.8)", marginBottom:4 }}>🏁 Race Day Plan</div>
                    <div style={{ fontSize:20, fontWeight:900, color:"#fff", marginBottom:4 }}>42.195 km · Sub 4:00</div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,0.85)", lineHeight:1.6 }}>
                      Gel every 45 min from km 10 · Electrolytes every aid station · Nothing new on race day!
                    </div>
                  </div>
                  {[
                    { c:P.teal,    e:"🍳", t:"Pre-run (easy)",     d:"Small snack or nothing. Banana or toast if >10km. Avoid heavy food 30min before." },
                    { c:P.electric,e:"🔥", t:"Pre-run (tempo ⭐)",  d:"Oats or rice 2hrs before. Banana 30 min before. Gel on run if >45 min." },
                    { c:P.violet,  e:"🍌", t:"Pre-run (long run)",  d:"Carb load the night before. Oats morning of. 1 gel per 45 min + electrolytes." },
                    { c:P.orange,  e:"🥛", t:"Post-run recovery",   d:"Protein + carbs within 30 min. Chocolate milk is perfect! Stretch + hydrate 💧" },
                    { c:P.coral,   e:"💊", t:"Supplements",         d:"Iron (especially period weeks!), magnesium, Vitamin D, omega-3. Ask your doctor 🩺" },
                    { c:P.yellow,  e:"🛁", t:"Recovery rituals",    d:"Epsom salt baths after long runs. Foam roll. 8hrs sleep. Cold shower after tempo." },
                  ].map((item,i) => (
                    <div key={i} style={{ ...card, display:"flex", gap:13, alignItems:"flex-start" }}>
                      <div style={{ width:44, height:44, borderRadius:16, background:`${item.c}18`, border:`1.5px solid ${item.c}35`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{item.e}</div>
                      <div>
                        <div style={{ fontSize:12, fontWeight:800, color:P.textDark, marginBottom:3 }}>{item.t}</div>
                        <div style={{ fontSize:11, color:P.textMid, lineHeight:1.6 }}>{item.d}</div>
                      </div>
                    </div>
                  ))}
                  <div style={{ textAlign:"center", fontSize:12, color:P.textSoft, fontStyle:"italic", paddingBottom:6 }}>
                    You're running 42.2km. You deserve to eat! 🍝✨
                  </div>
                </div>
              )}
            </div>{/* end main-wrap */}
          </div>{/* end app-shell */}

          {/* Bottom nav (mobile) */}
          <div className="bottom-nav" style={{ background:P.white, borderTop:`1.5px solid ${P.border}`, position:"fixed", bottom:0, left:0, right:0, zIndex:100, boxShadow:"0 -4px 20px rgba(67,97,238,0.08)" }}>
            {navItems.map(({id,icon,label}) => {
              const active = tab===id;
              return (
                <button key={id} onClick={()=>setTab(id)} style={{ flex:1, padding:"10px 2px 8px", background:"transparent", border:"none", color:active?P.electric:P.textSoft, fontSize:9, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2, fontWeight:active?800:500, fontFamily:"inherit", position:"relative" }}>
                  {active && <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:28, height:3, borderRadius:"0 0 4px 4px", background:P.electric }}/>}
                  <div style={{ width:36, height:36, borderRadius:12, background:active?`${P.electric}15`:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:active?20:18 }}>{icon}</div>
                  <span>{label}</span>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
