function mpsToMmSs(mps) {
  if (!mps || mps <= 0) return "";
  var s = 1000/mps, m = Math.floor(s/60);
  return m + ":" + Math.round(s%60).toString().padStart(2,"0");
}

function paceToMin(paceStr) {
  if (!paceStr) return null;
  var parts = paceStr.split(":");
  if (parts.length !== 2) return null;
  return parseInt(parts[0]) + parseInt(parts[1])/60;
}

function parseStravaActivities(acts) {
  var runs = {};
  (acts||[]).filter(function(a){ return a.type==="Run" && a.distance>=500; }).forEach(function(a) {
    var d = new Date(a.start_date_local).toISOString().substring(0,10);
    var key = runs[d] ? d+"-"+a.id : d;
    var mt = a.moving_time, mm=Math.floor(mt/60), ms=mt%60;
    runs[key] = { km:+(a.distance/1000).toFixed(2), pace:mpsToMmSs(a.average_speed), duration:mm+":"+ms.toString().padStart(2,"0"), elevation:String(Math.round(a.total_elevation_gain||0)), notes:a.name||"Run" };
  });
  return runs;
}

function getDayInCycle(periods) {
  if (!periods || periods.length === 0) return 10;
  var sorted = periods.slice().sort(function(a,b){ return new Date(b.start)-new Date(a.start); });
  var pStart = new Date(sorted[0].start);
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.floor((today - pStart) / 86400000) + 1;
  while (diff > 28) diff -= 28;
  return Math.max(1, diff);
}

function getPhaseIdx(day) {
  if (day <= 5) return 0;
  if (day <= 13) return 1;
  if (day <= 17) return 2;
  return 3;
}

function getWeekPhase(weekDates, periods) {
  if (!periods || periods.length === 0) return null;
  var mons = {Nov:10,Dec:11,Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7};
  var str = weekDates.split("-")[0].trim().replace("–","");
  var parts = str.split(" ");
  var day = parseInt(parts[0]);
  var monStr = parts[1] ? parts[1].substring(0,3) : null;
  if (!monStr || mons[monStr] === undefined) return null;
  var mon = mons[monStr];
  var yr = (mon >= 10) ? 2025 : 2026;
  var wDate = new Date(yr, mon, day);
  var sorted = periods.slice().sort(function(a,b){ return new Date(b.start)-new Date(a.start); });
  var pStart = new Date(sorted[0].start);
  var diff = Math.floor((wDate - pStart) / 86400000) + 1;
  while (diff > 28) diff -= 28;
  while (diff < 1) diff += 28;
  return { phaseIdx: getPhaseIdx(diff), day: diff };
}

// ── Mini bar chart ─────────────────────────────────────────────────────────
function BarChart({ data }) {
  const [hovered, setHovered] = useState(null);
  var max = Math.max.apply(null, data.map(function(d){ return Math.max(d.planned||0, d.actual||0); }));
  if (max === 0) max = 1;
  return (
    <div>
      {hovered !== null && (
        <div style={{ background:P.textDark, color:"#fff", borderRadius:12, padding:"8px 12px", marginBottom:8, fontSize:11 }}>
          <strong>{data[hovered].week}</strong> &bull; {data[hovered].dates}<br/>
          <span style={{color:P.teal}}>Actual: {data[hovered].actual}km</span> &nbsp;
          <span style={{color:"rgba(255,255,255,0.5)"}}>Planned: {data[hovered].planned}km</span> &nbsp;
          <span style={{color:P.yellow}}>Runs: {data[hovered].runs}</span>
        </div>
      )}
      <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:70, paddingBottom:2, overflowX:"auto" }}>
        {data.map(function(d, i) {
          var aH = Math.max(Math.round((d.actual/max)*64), 2);
          var pH = Math.max(Math.round((d.planned/max)*64), 2);
          var over = d.actual >= d.planned;
          var sel = hovered === i;
          return (
            <div key={i} style={{ display:"flex", alignItems:"flex-end", gap:1, cursor:"pointer", flexShrink:0 }}
              onMouseEnter={function(){ setHovered(i); }} onMouseLeave={function(){ setHovered(null); }}
              onClick={function(){ setHovered(sel?null:i); }}>
              <div style={{ width:9, height:pH, background:sel?P.electric+"90":P.electric+"25", borderRadius:"3px 3px 0 0" }}/>
              <div style={{ width:9, height:aH, background:sel?(over?P.teal:P.orange):(over?P.teal+"CC":P.orange+"AA"), borderRadius:"3px 3px 0 0" }}/>
            </div>
          );
        })}
      </div>
      <div style={{ fontSize:9, color:P.textSoft, marginTop:3 }}>Tap a bar for week details</div>
    </div>
  );
}

// ── This week tracker ──────────────────────────────────────────────────────
function WeekTracker({ wk, sessions, onToggle }) {
  var done = wk.sessions.filter(function(_,i){ return sessions[wk.week+"_"+i]; }).length;
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
        <div style={{ fontSize:12, fontWeight:800 }}>This week &bull; {wk.week}</div>
        <div style={{ fontSize:11, color:P.electric, fontWeight:700 }}>{done}/{wk.sessions.length}</div>
      </div>
      <div style={{ height:5, background:P.border, borderRadius:3, overflow:"hidden", marginBottom:8 }}>
        <div style={{ height:"100%", width:(done/wk.sessions.length*100)+"%", background:"linear-gradient(90deg,"+P.electric+","+P.teal+")", borderRadius:3, transition:"width 0.4s" }}/>
      </div>
      {wk.sessions.map(function(s, i) {
        var isDone = sessions[wk.week+"_"+i];
        var isTempo = s.includes("Tempo"), isLong = s.includes("Long"), isCross = s.includes("Pilates")||s.includes("Strength");
        var emoji = isDone ? "✅" : isTempo ? "🔥" : isLong ? "🌟" : isCross ? "🧘" : "🐣";
        return (
          <div key={i} onClick={function(){ onToggle(wk.week, i); }}
            style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 8px", borderRadius:10, background:isDone?P.teal+"15":P.border+"50", marginBottom:4, cursor:"pointer", border:"1px solid "+(isDone?P.teal+"40":P.border) }}>
            <div style={{ width:22, height:22, borderRadius:"50%", border:"2px solid "+(isDone?P.teal:P.borderMid), background:isDone?P.teal:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              {isDone && <span style={{color:"#fff",fontWeight:900,fontSize:11}}>✓</span>}
            </div>
            <span style={{ fontSize:11, fontWeight:600, color:isDone?P.textSoft:P.textDark, textDecoration:isDone?"line-through":"none" }}>{emoji} {s}</span>
          </div>
        );
      })}
    </div>
  );
}

      Object.keys(runs).forEach(function(k){ if(k>="2025-12-01") filtered[k]=runs[k]; });
      setStravaRuns(filtered);
      localStorage.setItem("bonnie_strava_runs", JSON.stringify(filtered));
      showToast(Object.keys(filtered).length + " runs synced!");

    updated.sort(function(a,b){ return new Date(a.start)-new Date(b.start); });
    setPeriods(updated); localStorage.setItem("bonnie_periods",JSON.stringify(updated));

  var card = { background:"#fff", borderRadius:18, padding:"14px", marginBottom:10, border:"1px solid "+P.border, boxShadow:"0 3px 12px rgba(67,97,238,0.06)" };

  var currentWeek = PLAN_WEEKS[1];

          </div>

            <div style={{ fontSize:9, opacity:0.8 }}>days to go</div>
          </div>
        </div>
      </div>

      {toast && <div style={{ background:P.teal, color:"#fff", padding:"9px 16px", textAlign:"center", fontSize:12, fontWeight:700 }}>{toast}</div>}

      <div style={{ padding:"12px 14px" }}>

        {tab==="dashboard" && <div className="fade-in">

          {/* Stats */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:10 }}>
            {[[P.electric,Object.keys(allRuns).length,"runs"],[P.teal,Math.round(totalKm)+"km","total"],[P.orange,avgPStr,"avg pace"],[P.violet,"5:41","goal"]].map(function(x){
              return <div key={x[2]} style={{background:"#fff",borderRadius:12,padding:"10px 4px",textAlign:"center",border:"1px solid "+P.border}}>
                <div style={{fontSize:15,fontWeight:900,color:x[0]}}>{x[1]}</div>
                <div style={{fontSize:9,color:P.textSoft,marginTop:1}}>{x[2]}</div>
              </div>;

          </div>

          {/* Pace card */}
          <div style={{...card,border:"1.5px solid "+P.electric+"30"}}>
            <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Pace vs Goal (Sub 4:00)</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div><div style={{fontSize:9,color:P.textSoft}}>Your avg</div><div style={{fontSize:22,fontWeight:900,color:P.orange}}>{avgPStr}<span style={{fontSize:10,color:P.textSoft}}>/km</span></div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:P.textSoft}}>Goal</div><div style={{fontSize:22,fontWeight:900,color:P.teal}}>5:41<span style={{fontSize:10,color:P.textSoft}}>/km</span></div></div>
            </div>
            <div style={{height:8,background:P.border,borderRadius:4,overflow:"hidden",marginBottom:5}}>
              <div style={{height:"100%",width:"58%",background:"linear-gradient(90deg,"+P.electric+","+P.orange+")",borderRadius:4}}/>
            </div>
            <div style={{fontSize:10,color:P.textMid}}>Need to improve <strong style={{color:P.orange}}>~29 sec/km</strong> to hit sub 4:00 💪</div>
          </div>

          {/* Progress chart */}
          <div style={card}>
            <div style={{fontSize:10,fontWeight:800,color:P.textSoft,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Km Progress · Weeks 1-14</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div><div style={{fontSize:9,color:P.textSoft}}>Actual</div><div style={{fontSize:20,fontWeight:900,color:P.teal}}>{totalActual.toFixed(1)}km</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:9,color:P.textSoft}}>Planned</div><div style={{fontSize:20,fontWeight:900,color:P.electric}}>{totalPlanned}km</div></div>
            </div>
            <div style={{height:6,background:P.border,borderRadius:3,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:Math.min(100,totalActual/totalPlanned*100).toFixed(0)+"%",background:"linear-gradient(90deg,"+P.teal+","+P.electric+")",borderRadius:3}}/>
            </div>
            <BarChart data={COMPLETED_WEEKS}/>
            <div style={{display:"flex",gap:12,marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:P.textSoft}}><div style={{width:8,height:8,background:P.electric+"40",borderRadius:2}}/>Planned</div>
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:P.textSoft}}><div style={{width:8,height:8,background:P.teal,borderRadius:2}}/>Actual</div>

          </div>

          {/* This week */}
          <div style={{...card,border:"1.5px solid "+P.electric+"30"}}>

          </div>

          {/* Upcoming */}
          <div style={card}>

            {PLAN_WEEKS.slice(1,4).map(function(wk) {
              var ci = getWeekPhase(wk.dates, periods);

                    <div style={{fontSize:10,color:P.textSoft}}>{wk.target}km target</div>

              </div>;

          <div style={{...card,border:"1.5px solid "+phase.color+"40",background:phase.color+"06"}}>

            <div style={{fontSize:16,fontWeight:900,color:phase.color,marginBottom:4}}>{phase.emoji} {phase.phase}</div>
            <div style={{fontSize:11,color:P.textMid,marginBottom:6}}>{phase.training}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {nextPeriod > 0 && <div style={{fontSize:10,background:P.coral+"15",color:P.coral,borderRadius:8,padding:"3px 8px",fontWeight:700}}>Period in ~{nextPeriod} days</div>}
              {fertile && <div style={{fontSize:10,background:P.orange+"15",color:P.orange,borderRadius:8,padding:"3px 8px",fontWeight:700}}>Fertile window now</div>}
            </div>
          </div>

          {!auth && <div style={{...card,border:"1.5px solid #FC4C0240",background:"#FC4C0208"}}>
            <div style={{fontWeight:800,color:"#FC4C02",marginBottom:6,fontSize:13}}>Connect Strava to sync runs automatically</div>
            <button onClick={function(){ window.location.href="/api/strava-login"; }}
              style={{background:"#FC4C02",border:"none",color:"#fff",borderRadius:12,padding:"10px 18px",fontSize:12,fontWeight:800,cursor:"pointer",width:"100%"}}>
              Connect Strava
            </button>
          </div>}
        </div>}

        {tab==="strava" && <div className="fade-in">
          <div style={{fontWeight:900,fontSize:18,marginBottom:4}}>Strava</div>
          <div style={{fontSize:11,color:P.textSoft,marginBottom:12}}>Your runs synced automatically</div>

          <div style={{background:"linear-gradient(135deg,#FC4C02,#FF8C00)",borderRadius:20,padding:"18px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:16,fontWeight:900,marginBottom:4}}>{auth?"Connected":"Not connected"}</div>
            <div style={{fontSize:11,opacity:0.85,marginBottom:12}}>{auth?Object.keys(stravaRuns).length+" live + "+Object.keys(STRAVA_HISTORY).length+" history":"Connect once, syncs every time"}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){ auth?doSync(auth):window.location.href="/api/strava-login"; }}
                style={{background:"rgba(255,255,255,0.25)",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:12,padding:"9px 16px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}}>
                {syncing?"Syncing...":auth?"Sync Now":"Connect Strava"}
              </button>
              {auth && <button onClick={function(){ localStorage.removeItem("bonnie_auth");localStorage.removeItem("bonnie_strava_runs");setAuth(null);setStravaRuns({}); }}
                style={{background:"rgba(0,0,0,0.15)",border:"1.5px solid rgba(255,255,255,0.2)",borderRadius:12,padding:"9px 12px",color:"rgba(255,255,255,0.7)",fontSize:11,cursor:"pointer"}}>
                Disconnect
              </button>}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:10}}>
            {[[P.teal,Object.keys(allRuns).length,"runs"],[P.electric,Math.round(totalKm)+"km","total"],[P.orange,avgPStr,"avg pace"]].map(function(x){
              return <div key={x[2]} style={{background:"#fff",borderRadius:12,padding:"10px 6px",textAlign:"center",border:"1px solid "+P.border}}>
                <div style={{fontSize:16,fontWeight:900,color:x[0]}}>{x[1]}</div>
                <div style={{fontSize:9,color:P.textSoft}}>{x[2]}</div>
              </div>;
            })}
          </div>

          {Object.entries(allRuns).sort(function(a,b){ return b[0].localeCompare(a[0]); }).map(function(entry) {
            var date=entry[0], run=entry[1];
            return <div key={date} style={{...card,display:"flex",alignItems:"center",gap:12,padding:"11px 13px"}}>
              <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#FC4C02,#FF8C00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🟠</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14}}>{(run.km||0).toFixed(1)}km</div>
                <div style={{fontSize:10,color:P.textSoft}}>{date.substring(0,10)}{run.pace?" · "+run.pace+"/km":""}</div>
                {run.notes&&<div style={{fontSize:10,color:"#FC4C02",fontWeight:700,marginTop:1}}>{run.notes}</div>}
              </div>
              {run.duration&&<div style={{fontSize:11,color:P.textSoft}}>{run.duration}</div>}
            </div>;
          })}
        </div>}

        {tab==="plan" && <div className="fade-in">
          <div style={{fontWeight:900,fontSize:18,marginBottom:2}}>Training Plan</div>
          <div style={{fontSize:11,color:P.textSoft,marginBottom:periods.length>0?2:10}}>Weeks 15-40 · Goal 5:41/km pace</div>
          {periods.length>0&&<div style={{fontSize:11,color:P.violet,fontWeight:700,marginBottom:10}}>Cycle-synced · plan adapts to your cycle</div>}
          {PLAN_WEEKS.map(function(wk) {
            var isExp=expanded===wk.week;
            var done=wk.sessions.filter(function(_,si){ return sessions[wk.week+"_"+si]; }).length;
            var ci=getWeekPhase(wk.dates,periods);
            var ph2=ci?CYCLE_PHASES[ci.phaseIdx]:null;
            var accent=ph2?ph2.color:P.electric;
            var isPeak=wk.week==="Week 32";
            return <div key={wk.week} style={{background:"#fff",borderRadius:16,marginBottom:8,border:"1px solid "+P.border,overflow:"hidden"}}>
              <div style={{height:3,background:"linear-gradient(90deg,"+accent+","+accent+"55)"}}/>
              <div onClick={function(){ setExpanded(isExp?null:wk.week); }} style={{padding:"11px 13px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
                    <span style={{fontWeight:800,fontSize:13}}>{wk.week}</span>
                    <span style={{fontWeight:400,color:P.textSoft,fontSize:11}}>{wk.dates}</span>
                    {isPeak&&<span style={{fontSize:9,background:P.yellow+"30",color:"#AA8800",borderRadius:6,padding:"1px 6px",fontWeight:700}}>PEAK</span>}
                    {ph2&&<span style={{fontSize:9,background:ph2.color+"20",color:ph2.color,borderRadius:6,padding:"1px 6px",fontWeight:700}}>{ph2.emoji}</span>}
                  </div>
                  <div style={{fontSize:10,color:P.textSoft,marginBottom:ph2?2:0}}>{wk.target}km · {done}/{wk.sessions.length} done</div>
                  {ph2&&ci&&<div style={{fontSize:10,fontWeight:700,color:ph2.color}}>
                    {ph2.mod==="REDUCE"?"🩸 Period week - reduce intensity":ph2.mod==="PEAK"?"🌺 Peak energy - push hard!":ph2.mod==="TAPER"?"🍂 Wind down approaching":"⭐ Good energy - build well"}
                  </div>}
                </div>
                <div style={{textAlign:"right",minWidth:32}}>
                  <div style={{fontSize:11,fontWeight:800,color:accent}}>{done}/{wk.sessions.length}</div>
                  <div style={{width:32,height:4,background:accent+"20",borderRadius:2,marginTop:3}}>
                    <div style={{width:(done/wk.sessions.length*100)+"%",height:"100%",background:accent,borderRadius:2,transition:"width 0.3s"}}/>
                  </div>
                </div>
                <div style={{fontSize:12,color:P.textSoft}}>{isExp?"▲":"▼"}</div>
              </div>
              {isExp&&<div style={{padding:"0 13px 12px",borderTop:"1px solid "+P.border}}>
                {ph2&&<div style={{background:ph2.color+"12",borderRadius:10,padding:"7px 10px",marginBottom:8,fontSize:11,color:ph2.color,fontWeight:700}}>
                  {ph2.emoji} {ph2.phase} · {ph2.training}
                </div>}
                {wk.sessions.map(function(s,si) {
                  var d=sessions[wk.week+"_"+si];
                  var mod="";
                  if (ph2) {
                    if (ph2.mod==="REDUCE"&&(s.includes("Tempo")||s.includes("Long"))) mod=" ⚠️ consider reducing";
                    if (ph2.mod==="PEAK"&&(s.includes("Long")||s.includes("Tempo"))) mod=" ⭐ peak window!";
                    if (ph2.mod==="TAPER"&&(s.includes("Tempo")||s.includes("Long"))) mod=" 🍂 listen to body";
                  }
                  return <div key={si} onClick={function(){ toggleSession(wk.week,si); }}
                    style={{display:"flex",alignItems:"center",gap:9,padding:"7px 0",borderBottom:"1px solid "+P.border,cursor:"pointer"}}>
                    <div style={{width:21,height:21,borderRadius:"50%",border:"2px solid "+(d?P.teal:P.border),background:d?P.teal:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {d&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
                    </div>
                    <span style={{fontSize:12,color:d?P.textSoft:P.textDark,textDecoration:d?"line-through":"none"}}>{s}{mod}</span>
                  </div>;
                })}
              </div>}
            </div>;
          })}
        </div>}

        {tab==="cycle" && <div className="fade-in">
          <div style={{fontWeight:900,fontSize:18,marginBottom:2}}>Cycle Tracker</div>
          <div style={{fontSize:11,color:P.textSoft,marginBottom:12}}>Your body, your training</div>

          {/* Phase hero */}
          <div style={{background:"linear-gradient(135deg,"+phase.color+","+phase.color+"BB)",borderRadius:22,padding:"18px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:10,opacity:0.8,marginBottom:4}}>Today · Day {cycleDay} of 28</div>
            <div style={{fontSize:22,fontWeight:900,marginBottom:4}}>{phase.emoji} {phase.phase}</div>
            <div style={{fontSize:11,opacity:0.9,lineHeight:1.6,marginBottom:10}}>{phase.training}</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <div style={{background:"rgba(255,255,255,0.2)",borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:700}}>Period in ~{nextPeriod} days</div>

              {fertile && <div style={{background:"rgba(255,255,255,0.3)",borderRadius:10,padding:"3px 9px",fontSize:10,fontWeight:700}}>Fertile window now!</div>}
            </div>
          </div>

          {/* Cycle strip */}
          <div style={card}>
            <div style={{fontSize:11,fontWeight:800,marginBottom:8}}>Where you are today</div>
            <div style={{display:"flex",gap:1.5,marginBottom:6}}>
              {Array.from({length:28},function(_,i){
                var d=i+1, ph=CYCLE_PHASES[getPhaseIdx(d)], isTd=d===cycleDay;
                return <div key={d} style={{flex:1,height:isTd?20:12,background:ph.color+(isTd?"":"55"),borderRadius:2,position:"relative",minWidth:0,transition:"height 0.2s"}}>
                  {isTd&&<div style={{position:"absolute",bottom:"100%",left:"50%",transform:"translateX(-50%)",fontSize:8,color:ph.color,lineHeight:1}}>▼</div>}
                </div>;
              })}
            </div>
            <div style={{display:"flex",gap:8,fontSize:9,color:P.textSoft}}>
              {CYCLE_PHASES.map(function(ph){ return <span key={ph.phase} style={{color:ph.color,fontWeight:700}}>{ph.emoji} {ph.days}</span>; })}
            </div>
          </div>

          {/* Info grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {[
              {icon:"💧",title:"Discharge",body:phase.discharge,color:phase.color},
              {icon:"🌡️",title:"Fertility",body:phase.fertility,color:fertile?P.orange:P.teal},
              {icon:"🧠",title:"Mood & Energy",body:phase.mood,color:P.violet},
              {icon:"🥗",title:"Nutrition",body:phase.nutrition,color:P.teal},
            ].map(function(item){
              return <div key={item.title} style={{background:"#fff",borderRadius:14,padding:"11px 10px",border:"1px solid "+P.border}}>
                <div style={{fontSize:18,marginBottom:3}}>{item.icon}</div>
                <div style={{fontSize:11,fontWeight:800,color:item.color,marginBottom:3}}>{item.title}</div>
                <div style={{fontSize:10,color:P.textMid,lineHeight:1.5}}>{item.body}</div>
              </div>;
            })}
          </div>

          {/* Symptoms */}
          <div style={card}>
            <div style={{fontSize:12,fontWeight:800,marginBottom:8}}>Common symptoms this phase</div>

              {phase.symptoms.map(function(s){ return <div key={s} style={{background:phase.color+"15",color:phase.color,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:600}}>{s}</div>; })}
            </div>
          </div>

          {/* Log period */}
          <div style={{...card,border:"1.5px solid "+P.coral+"40",background:P.coral+"06"}}>

            <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:10,color:P.textSoft,marginBottom:4}}>Start date</div>
                <input type="date" value={newStart} onChange={function(e){ setNewStart(e.target.value); }}
                  style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:13,fontFamily:"inherit"}}/>
              </div>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:10,color:P.textSoft,marginBottom:4}}>End date</div>
                <input type="date" value={newEnd} onChange={function(e){ setNewEnd(e.target.value); }}
                  style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1.5px solid "+P.border,fontSize:13,fontFamily:"inherit"}}/>
              </div>
            </div>
            <button onClick={savePeriod}
              style={{background:P.coral,border:"none",color:"#fff",borderRadius:12,padding:"10px",fontSize:13,fontWeight:800,cursor:"pointer",width:"100%"}}>
              Save Period
            </button>
          </div>

          {/* History */}
          {periods.length>0&&<div style={card}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:8}}>Period history</div>
            {periods.slice().reverse().map(function(p){
              var len=p.end&&p.end!==p.start?Math.floor((new Date(p.end)-new Date(p.start))/86400000)+1:1;
              return <div key={p.start} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid "+P.border}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700}}>{p.start}{p.end&&p.end!==p.start?" to "+p.end:""}</div>
                  <div style={{fontSize:10,color:P.textSoft}}>{len} day{len!==1?"s":""}</div>
                </div>
                <button onClick={function(){ var u=periods.filter(function(x){ return x.start!==p.start; }); setPeriods(u); localStorage.setItem("bonnie_periods",JSON.stringify(u)); saveCloud({periods:u,sessions:sessions}); }}
                  style={{background:"none",border:"none",color:P.textSoft,cursor:"pointer",fontSize:18,padding:"4px 8px"}}>✕</button>
              </div>;
            })}
          </div>}

          {/* Full guide */}
          <div style={{fontWeight:800,fontSize:13,marginBottom:8,marginTop:4}}>Full Cycle Guide</div>
          {CYCLE_PHASES.map(function(ph,i){
            var active=i===phaseIdx;
            return <div key={i} style={{...card,border:"1.5px solid "+ph.color+(active?"50":"18"),background:active?ph.color+"06":"#fff"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <div style={{fontWeight:800,color:ph.color}}>{ph.emoji} {ph.phase}</div>
                <div style={{fontSize:10,color:P.textSoft}}>{ph.days}</div>
              </div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Training:</strong> {ph.training}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Discharge:</strong> {ph.discharge}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Fertility:</strong> {ph.fertility}</div>
              <div style={{fontSize:11,color:P.textMid,marginBottom:3}}><strong>Mood:</strong> {ph.mood}</div>
              <div style={{fontSize:11,color:P.textMid}}><strong>Nutrition:</strong> {ph.nutrition}</div>
            </div>;
          })}
        </div>}

      </div>

      <div className="bottom-nav">
        {nav.map(function(item){
          var id=item[0],icon=item[1],label=item[2],active=tab===id;
          return <button key={id} onClick={function(){ setTab(id); }} style={{flex:1,padding:"8px 2px 6px",background:"transparent",border:"none",color:active?P.electric:P.textSoft,fontSize:9,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontWeight:active?800:500,position:"relative"}}>
            {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,borderRadius:"0 0 4px 4px",background:P.electric}}/>}
            <div style={{fontSize:active?22:18}}>{icon}</div>
            <span>{label}</span>
          </button>;
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
